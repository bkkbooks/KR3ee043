下一寸幽門銅人經在巨闕傍五分營昇按諸書幽門俠巨闕傍五分滑氏上脘在巨闕下一寸當一寸五分去蔽骨三寸因是考之巨闕臍上六寸五分幽門亦臍上六寸五分馬氏曰巨闕言臍上六寸五分此等之說皆上脘者因於巨闕下一寸五分之說氣府論言每寸各一則幽門臍上五寸上脘旁當焉姑從此步廊神封下一寸六分去中行二寸仰臥取之神封靈墟下一寸六分靈墟神藏下一寸六分神藏或中下一寸六分營昇按此穴任脈紫宮傍二寸明堂灸經紫宮在華蓋下一寸因於此視之六分二字可削去或中俞府下一寸六分營昇按此穴任脈華蓋傍二寸資生經華蓋在璇璣下一寸明堂經在輸府下一寸由是視之六分二字可削去俞府巨骨下璇璣旁二寸廉泉根結篇曰足少陰根於湧泉結廉泉氣府論曰足少陰舌下各一王注足少陰舌下二在人迎前陷中動脈前是曰舌本左右二也足少陰脈氣所發口齒類要曰舌下廉泉此屬少陰刺瘧論曰舌下兩脈者廉泉也一名舌下足少陰經接自足太陽至陰穴而起於足心陷中之湧泉斜行足內踝前起大骨下陷者中為然谷內踝下一寸陷中為照海內踝後五分跟骨上動脈陷中為大溪大溪下一寸為水泉足跟後沖中大骨上兩筋間為大鐘內踝後上除踝二寸陷者中為復溜內踝上二寸少陰前太陰後筋骨間為交信內踝後上腨分中為築賓膝下內輔骨後大筋下小筋上為陰谷太赫下一寸為橫骨氣穴下一寸為太赫四滿下一寸為氣穴中注下一寸為四滿肓俞下一寸為中注商曲下一寸直臍傍為肓俞石關下一寸為商曲陰都下一寸為石關通谷下一寸夾中脘為陰都幽門下一寸夾上脘為通谷夾巨闕兩傍各五分陷中為幽門神封下一寸六分為步廊靈墟下一寸六分為神封神藏下一寸六分為靈墟或中下一寸六分為神藏俞府下一寸六分為或中巨骨下夾璇璣旁二寸陷中為俞府按根結篇云少陰根於湧泉結於廉泉今補此滑氏曰足少陰起小指下斜向足心之湧泉穴由湧泉轉出足內踝然谷穴下循內踝後太谿穴別入跟中之太鍾照海水泉乃折自太鍾之外上循內踝行厥陰太陰之後經復溜交信過三陰交上腨內循築賓出膕內廉抵陰谷也由陰谷上股內後廉貫脊會於脊之長強穴還出於前循橫骨太赭氣穴四滿中注肓俞之所臍之左右屬腎下臍下過關元中極而絡膀胱也其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏或中俞府而上循喉嚨並人迎挾舌本而終也其支者自神藏別出繞心注胸之膻中以交於手厥陰也手厥陰心包經入門曰戌時自俞府交與乳後天池循手臂下行至中指中衝穴止天池腋下三寸乳後一寸天泉千金方曰腋下二寸舉腋取之營昇按聖濟總錄銅人經卷之三資生經聚英醫統入門原始合參曲腋下二寸舉臂取之銅人經卷之一甲乙經發揮曲腋下去臂二寸舉臂取之銅人經卷之四曲腋下去肩二寸村上宗占謂去臂二字者即曲澤上二寸為天泉無疑也諸說由腋下二寸者伺何由然哉曲澤上不二寸則又去臂二寸無由也宗占說為是千金方外臺聖濟總錄醫統資生經聚英入門原始合參無去臂二字唯銅人經四去肩二字而非去臂者明矣曲澤神應經曰肘內廉陷中屈肘得之大筋內側橫紋中動脈郄門掌後去腕五寸間使入門曰太陵後三寸內關入門曰太陵後二寸太陵千金方曰掌後第一橫紋後兩筋間勞宮掌中屈無名指取之徐歌曰勞宮橫紋在掌中資生經一名掌中中衝大全曰手中指端內廉去爪甲如韭葉手厥陰心包經圖手厥陰經接自足少陰之俞府而起於乳後一寸腋下三寸之天池循腋下去肩臂二寸為天泉肘內廉橫紋陷中為曲澤掌後去腕五寸為郄門掌後三寸兩筋間陷中為間使掌後去腕二寸兩筋間為內關掌後骨下橫紋中兩筋間為大陵掌中央動脈為勞宮在手中指端去爪甲如韭葉為中衝滑氏曰手厥陰受足少陰之交起於胸中出屬心包由是下膈歷絡於三焦之上脘中脘及臍下一寸下焦之分支者自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉穴以介手太陰少陰兩經之中間入肘中之曲澤也由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮穴循中指出其端之中衝云支別者自掌中勞宮穴別行循小指次指出其端而交於手少陽也手少陽三焦經入門曰亥時自中衝交與手四指關衝循臂上行至面耳門穴止關衝大成曰小指次指外側去爪甲角如韭葉入門曰手四指端外側去爪甲角如韭葉大全無名指外端液門入門大全小指次指本節前中渚手小指次指本節後間陷中醫統大成手小指次指本節後陷中在腋門下一寸神應經入門大成握掌取之陽池入門曰手掌背橫紋陷中外關入門曰陽池後二寸支溝入門曰陽池後三寸兩筋骨間會宗入門曰支溝外旁一寸空中神照集曰在腕後三寸如外五分營昇按外臺標註程敬通曰腕後三寸空中腕後空唯兩骨陷中耳別無有空也又支溝會宗腕後三寸兩穴相併會宗去支溝傍一寸其間隔一筋支溝在大指之方會宗在小指之方會宗近於手陽明支溝近於手太陽三陽絡入門曰陽池後四寸大成原始支溝上一寸徐氏馬氏腕後四寸四瀆肘前五寸外廉陷中天井肘外大骨後上一寸兩筋間陷中屈肘取之清冷淵金鑑曰天井上行一寸營昇按甲乙經肘上一寸外臺銅人資生俱肘上二寸千金方大全綱目入門三寸以肘上二寸直天井上一寸為是消濼肩下臂外間腋斜肘分下行營昇按此穴諸書未謂寸法難得其穴先清冷淵與臑會當以其二穴正中為本穴也臑會肩前廉去肩頭三寸肩髎肩端臑上舉臂取之營昇按此穴大腸經肩髃與小腸經臑俞之中間是穴天髎大成曰肩缺盆中上毖骨際陷中須缺盆陷處上有穴起肉上是穴毖骨氣府論王注作伏骨即肩井後耎骨是也圖翼曰直肩井後一寸天牖十四經合參曰頸筋缺盆上天容後天柱前完骨下入髮際四分營昇按小腸經天容後膽經風池前完骨下發際督脈瘂門膀胱經天柱膽經風池三焦經天牖四穴相併取之翳風耳後尖角陷中按之耳中痛瘛脈耳本後雞足青脈中大成合參耳本後雞足青格脈營昇按瘛脈顱息之二穴諸書未謂寸法難求正穴先定翳風角孫二穴而後得之其法取一繩當翳風穴自耳後斜上至角孫穴截斷之復以其繩三折之第一折處瘛脈第二折處顱息是也顱息大成合參在耳後青絡脈角孫耳郭中間上開口有空原始曰在耳郭上中間髮際下閉口有空營昇按大成原始合參絲竹空和髎耳門為循序姑從於發揮經行已矣耳門耳前起肉當耳缺中和髎耳前兌發下橫動脈絲竹空眉後陷中手少陽經接自手厥陰中衝而起於手四指端外側爪甲角如韭葉之關衝循小指次指歧骨間陷中為液門四指本節後間陷中為中渚手表腕上陷者中為陽池腕後二寸兩筋間為外關腕後三寸兩骨間為支溝支溝外旁一寸為會宗臂上大交脈支溝上一寸為三陽絡肘前五寸外廉陷中為四瀆肘外大骨尖後肘上一寸兩筋間陷中為天井肘上二寸為清冷淵肩下臂外間腋斜肘分下行為消濼臂前廉去肩端三寸為臑會肩端臑上陷中為肩髎缺盆中上毖骨際陷中為天髎圖示清冷淵在肘上二寸伸肘舉臂取之天井在肘外大骨尖後肘上一寸兩筋間陷中頸大筋外缺盆上天容後天柱前完骨下發際中上夾耳後一寸為天牖耳後尖角陷中為翳風耳本後雞足青絡脈中為瘛脈耳後間青絡脈中為顱息耳廓中間上髮際下開口有空為角孫耳前起肉當耳缺處陷中為耳門耳前兌發下橫動脈為和髎眉後陷中為絲竹空滑氏曰手少陽起小指次指端關衝穴上出次指之間歷液門中渚循手表腕之陽池出臂外兩骨之間循外關支溝會宗三陽絡四瀆乃上貫肘抵天井穴也從天井上行循臂臑之外歷清冷淵消濼行手太陽之裡陽明之外上肩循臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而交會於膻中散布絡繞於心包乃下膈當胃上口以屬上焦於中脘以屬中焦於陰交以屬下焦也支者從膻中而上出缺盆之外上項過大椎循天牖上挾耳後經翳風瘛脈顱息直上出耳上角至角孫過懸釐頷厭及過陽白晴明屈曲下頰至䪼會顴髎之分也支者從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目銳眥會瞳子髎循絲竹空而交於足少陽也
