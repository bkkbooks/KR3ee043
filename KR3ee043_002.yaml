body:
  text: 卷二手太陽小腸經入門曰未時自少衝交與小指少澤循肘上行至面聽宮穴止少澤手小指外側端去爪甲角一分陷中前谷手小指外側本節前陷中後谿手小指外側本節後陷中儒門事親曰屈小指握紋盡處是穴醫學原始曰屈掌外側橫紋尖盡處是穴圖翼大成聚英入門手小指外側本節後陷中握掌取之大全節後橫紋尖上腕骨入門曰掌後外側高骨下陷中握掌向內取之陽谷手外側腕中兌骨下陷中醫學原始曰一取法大筋上大骨下紋尖當中是穴養老手髁骨上一空仰手探之則有髁骨上一空即當腕後一寸支正腕後五寸小海大成曰肘外大骨外去肘端五分陷中屈手向頭取之經筋篇曰彈之應小指之上類注但於肘尖下兩骨罅中以指捈其筋則痠麻應於小指之上是其驗也肩貞醫學原始曰肩髃後兩骨罅間髃恐當作髎入門曰肩髃後兩骨罅陷是穴臑俞挾肩髎後大骨下胛上廉陷中天宗秉風后大骨下陷中秉風天髎外肩上小髃後舉臂有空營昇按此穴諸書未言寸法先膽經肩井後一寸三焦經取天髎穴天髎後一寸隔骨間取之曲垣肩中央曲胛陷中按之應手痛肩外俞肩胛上廉去脊中三寸陷中肩中俞肩胛內廉去脊中二寸陷中神照集分寸歌肩中大椎傍天窗頸大筋前曲頰下扶突後動脈應手陷中天容耳曲頰後顴髎面頄骨下廉兌骨端陷中聽宮入門曰耳前珠子傍營昇按三焦經與膽經之聽會中間取之手太陽經接自手少陰之少衝而起於手小指外側端去爪甲角一分陷中少澤穴循本節前陷中為前谷本節後外側橫紋尖上為後谿手外側腕前起骨下陷中為腕骨腕中銳骨下陷中為陽谷手外髁骨上一空腕後一寸陷中為養老腕後外廉五寸為支正肘內大骨外去肘端五分陷中為小海屈手向頭取之圖示取養老穴須仰手見踝上一空即是在肩曲胛下兩骨解間肩髃後陷中為肩貞肩髎後大骨下胛上廉陷中為臑俞秉風后大骨下陷中為天宗肩上天髎外小髃骨舉臂有空為秉風肩中央曲胛陷中為曲垣肩胛上廉去脊大椎旁三寸陷中為肩外俞在內廉去椎二寸陷中為肩中俞頸大筋前曲頰下扶突後動脈為天窗耳下曲頰下後為天容面頄骨下廉銳骨端陷中為顴髎耳中珠子大如赤小豆為聽宮滑氏曰手太陽小腸經起小指端少澤穴由是循手外側之前谷後谿上腕出踝中歷腕骨陽谷養老穴也自養老穴直上循臂骨下廉支正穴出肘內側兩腎之間歷小海穴上循臑外後廉行手陽明少陽之外上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴乃會大椎因左右相交於兩肩之上自交肩上入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上脘中脘抵胃下行任脈之外當臍上二寸之分屬小腸其支者別從缺盆循頸之天窗天容上頰抵顴髎上至目銳眥過瞳子髎卻入耳中循聽宮而終其支者別頰上䪼抵鼻至目內眥晴明穴以交於足太陽也足太陽膀胱經入門曰申時自聽宮交與晴明循頭頸下皆腰臀腿至足小指至陰穴止晴明明堂灸經曰目內眥頭外一分醫學原始曰目內眥直紋中是穴攢竹眉頭陷中氣府論醫統兩眉頭少陷眉沖入門曰直眉頭上神庭曲差間營昇按入門原始共此穴屬於膀胱之經部今據而補焉曲差針方六集曰挾神庭兩傍開一寸五分在髮際正頭取之五處針方六集曰在星穴兩傍各開一寸五分上曲差一寸承光五處後一寸五分馬氏曰承光發上二寸半通天承光後一寸五分絡卻通天後一寸五分玉枕絡卻後一寸五分挾腦戶傍一寸三分枕骨上入髮際三寸營昇按甲乙經云絡卻後七分千金方並聖惠方絡卻後七分半銅人經聖濟總錄針方六集入門大成發揮原始聚英絡卻後一寸五分又云入髮際三寸或二寸自曲差至絡卻五寸半玉枕穴絡卻後一寸五分取之於前髮際則其間通計七寸也腦戶穴自神庭至百會五寸自百會至腦戶四寸五分即為自前髮際通計九寸五分是無挾腦戶傍之理若從挾腦戶之說則入髮際二寸五分為是或云入髮際三寸非是天柱原始曰在項後髮際大筋外廉陷中大杼神照集曰在項後第一椎下兩旁各開一寸五分陷中正坐取之營昇按八脈考釋音曰椎音槌脊之骨節也背輸篇類注曰集即椎之義指脊骨之節間也古謂之焦亦謂之顀後世作椎去脊中行說甚多矣甲乙經千金方外臺聖濟總錄發揮銅人經大全大成背部第二行相去脊中一寸五分第三行相去脊中為三寸醫統資生經聚英類經金鑑入門背二行除脊一寸半相去脊中二寸背三行相去脊中三寸半諸說不同背二行相去脊中一寸半背三行相去脊中三寸為是滑氏曰自大杼至白環諸穴並第二行相去脊中各一寸五分歌曰自大杼至白環相去脊中三寸間夫既曰脊中則自脊骨中間量取而非骨外量取明矣圖翼曰脊骨內闊一寸凡云第二行夾脊一寸半三行夾脊三寸者除脊一寸外故在二行當為二寸在三行當為三寸半聚英曰當除去脊骨一寸外量取之此說不可從風門第二椎下肺腧第三椎下厥陰腧第四椎下心腧第五椎下督俞入門曰第六節下外一寸半大成金鑑入門原始共此穴屬於膀胱之經部今據而補焉膈腧第七椎下肝腧第九椎下膽腧第十椎下脾腧第十一椎下胃腧第十二椎下三焦腧第十三椎下腎腧第十四椎下聚英醫統圖翼自大杼至腎俞凡十三穴皆有正坐取之四字千金方曰以杖量至臍及當脊骨然後相去各一寸半腎俞也按之雖然肥人腹垂則抵瘦人腹平則臍平今不論肥瘦均以杖量之未有準針灸大全曰令患人平身垂手正立於平正木石之上目無斜視無偏倚去上衣服用切直杖子從地以至臍中央截斷卻回杖子於背上當脊骨中杖盡處即十四柱命門穴也以墨記卻用稗心取同身寸三寸摺作一寸五分兩頭是腎俞穴也氣海俞第十五椎下大成入門金鑑原始共屬於膀胱之經部今據而補焉大腸俞第十六椎下關元俞第十七椎下大成入門金鑑原始共此穴屬於膀胱經部今據而補焉小腸俞第十八椎下膀胱俞第十九椎下中膂內俞第二十椎下白環俞第二十一椎下伏而取之聚英醫統圖翼自大腸俞至白環俞凡五穴皆伏而取之上髎入門曰腰髁骨下第一空挾脊兩旁陷中餘三窌少斜上闊下狹是也次髎第二空挾脊陷中中髎第三空挾脊陷中下髎第四空挾脊陷中營昇按甲乙經上窌在第一空腰髁下一寸挾者陷者中足太陽少陽之絡也釋骨曰骶之上俠脊十七節至二十一節起骨曰腰髁骨圖翼曰腰髁腰骻自十六椎而挾脊附著之處也甲乙經所謂在上髎腰髁下一寸是則自十七椎二十椎之間左右挾脊者各上闊下狹有四孔即是為八髎穴既明矣又金鑑曰腰骨即脊骨十四椎下十五十六椎間尻上之骨也尻骨者腰骨下十七椎十八椎十九椎二十椎二十一椎五節之骨也上四節紋之旁左右各四孔骨形凹如瓦長四五寸許上寬下窄末節更小如人參蘆形名尾閭一名骶端一名橛骨一名窮骨又刺腰痛論王注曰髁下尻骨兩傍四骨空左右八穴俗呼此骨為八髎骨也又東醫寶鑑曰嘗見死人骸腰脊骨盡處有一骨廣如人面大四空分兩行了然通透乃是八髎骨也又刺腰痛論注曰上髎當髁骨下陷中餘三窌少斜下陷中是也寬政庚戌冬予得刑人骸解而視之腰髁左右果有上闊下狹有骨空者與刺腰痛論醫學入門東醫寶鑑所說符矣因從其說云會陽尾髎骨兩旁銅人經尾髎骨作尾骶甲乙經作陰毛骨營昇按甲乙經曰在陰毛骨兩傍督脈氣所發故堀元厚安井元越因謂此穴移入於督脈氣府論甲乙經本經穴雖系督脈然至銅人經系之足太陽經也蓋二十一椎下腰俞而非長強也尾髎骨即脊椎最下一骨而更在二十一椎下長強亦在其下端耳圖翼曰男子尖女子圓而平神照集曰在陰尻骨兩傍去長強一分承扶尻臀下股陰上紋中殷門圖翼曰承扶下六寸膕上兩筋之間浮郄委陽上一寸展膝得之委陽入門曰膝腕橫紋外廉兩筋間委中外二寸營昇按村上宗占所謂滑氏注十四經之時直從甲乙經用承扶下六寸屈身取之九字加於委陽之注者可謂疏漏耳承扶下六寸屈身取之九字衍文可削去矣承扶下六寸則此當股之中央安有屈身之理乎不可不辨焉樓英醫學綱目詳言委陽之尺寸今以經文考之當曰一尺六寸銅人經委陽在承扶下六寸銅人經蓋祖甲乙經甲乙經元脫一尺二字耳余私以為醫學綱目承扶下有一尺二字則當定為承扶下一尺六寸無疑矣委陽穴一說足太陽之前少陽之後膕中外廉兩筋之間屈膝取之是也此說為尤得之由是視之委中即膕中央委陽即膕之陽分約文盡處兩筋之間是也又按醫學原始曰委陽穴在膝腕橫脈尖外廉兩筋間委中外二寸屈身取之又針方六集曰膝後約紋中尖兩筋間動脈其穴伏臥取之其他入門神照集諸書並宜參考焉委中膕中央約紋中動脈神照集曰膝後約紋中央兩筋間動脈是穴伏臥取之營昇按足太陽膀胱經自晴明而始上巔頂下天柱大杼挾脊為第二行歷諸穴循尻臀下委中也是謂膀胱之本經也第三行從天柱別而下附分從附分至秩邊歷諸穴下行而下委中合於本經也是謂膀胱之大絡脈也蓋此經從附分而下秩邊從秩邊又橫行於環跳下行於髀外側合委中附分神照集曰在第二椎下附項廉去脊兩旁各開三寸正坐取之魄戶第三椎下膏肓圖翼曰此穴自晉以前所未有乃後人之所增也千金方以後有此屬奇俞諸家屬膀胱營昇按甲乙經千金翼發揮為四椎下五椎上圖翼五椎上四椎下各三寸半大成四椎下一分五椎上二分大全四椎下二分微多五椎上一分微少醫學原始四椎下二分五椎上二分神照集四椎下微帶五椎骨上兩傍各開三寸正坐開肩取之入門四椎微下一分五椎微上二分諸說紛紛不能歸定於一矣明堂灸經銅人經姜希銅人聖濟總錄資生經綱目萬病回春莊綽膏肓灸法葉元善等為四椎下兩傍同身寸各三寸似穩當焉今從之神堂第五椎下譩譆第六椎下膈關第七椎下正坐闊肩取之營昇按甲乙經闊作開肘與肘併合則肩胛開闊膏肓神堂譩譆又如此不然則胛骨覆經不得其穴也魂門第九椎下陽綱第十椎下意舍第十一椎下胃倉第十二椎下肓門第十三椎下醫統曰在十三椎下兩旁相去脊中各三寸陷中叉肋間與鳩尾相直正坐取之志室第十四椎下並正坐取之自附分至此皆正坐取之故曰並胞肓第十九椎下十四經合參曰十九椎下兩旁相去三寸伏取之秩邊甲乙經曰第二十一椎下兩旁各三寸陷者中營昇按明堂灸經銅人經綱目發揮大成以二十椎為秩邊非也甲乙原始資生經王冰注以二十一椎為秩邊為是合陽甲乙經在膝約文中央下二寸千金方聚英馬氏發揮金鑑原始膝約文中央下三寸醫學入門徐氏大全歌委中下一寸甲乙經外臺聖濟總錄銅人經醫統綱目圖翼神照集十四經合參膝膕約紋下二寸以二寸為是承筋外臺秘要曰引救急云以繩從腳心下度至腳踵便截斷度則回此度從腳踵縱量向上盡度頭當腨下際宛宛中是穴營昇按醫統曰腨腸中央陷中脛後從腳跟上七寸又醫學原始脛後腨股中央從腳跟上七寸醫統原始共腳跟上七寸非也腨股中央凡委中下至跟一尺六寸在於其中央承筋穴自跟者為八寸也七寸不合故外臺之說為是承山醫學原始曰腨腸下分肉間陷中貼腳見人字影取之神照集曰在足兌腨腸下分肉間陷中伏臥用兩足大指堅挺乃取之飛陽入門原始曰外踝上七寸骨後跗陽銅人經外踝上三寸飛陽下甲乙經神照集足外踝上三寸