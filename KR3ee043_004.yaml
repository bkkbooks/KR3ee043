body:
  text: 卷四內景蠡海集曰天開於子地開於醜人生於寅寅時手太陰之氣始動其應在寸口寸口以侯上部肺居五藏之上部獨為五藏之華蓋所以管領一身之氣類經曰肺朝百脈以行陰陽而五臟六腑皆以受故十二經以肺為首循序相傳盡於足厥陰肝經而又傳於肺終而後是為一周痿論曰肺者藏之長也為心之蓋也張介賓曰肺位最高故謂之長高武曰肺者朝百脈故肺者藏之長馬氏曰肺者為諸藏之華蓋華元化曰肺者生氣之原乃五藏之華蓋入門曰肺形似人肩而為藏之蓋程氏醫彀曰肺形如人肩二布大葉四垂如蓋醫經原旨曰肺形似人肩二布葉中有二十四空行列分布諸藏清濁之氣又應二十四氣也肺前面全狀營升按其形如蜂窠下無通竅隨呼吸而盈虛其色如藍光澤有斑紋古人皆謂六葉兩耳大概之言耳古今說內形比之內形殆有不相似者矣入門醫彀原始等說略近之肺系聖濟總録曰喉嚨以下為肺系骨者纍纍然其十二又曰天蓋骨下為肺系之本藏府指掌圖書曰錢豫齊曰會厭綴於舌本之下正應乎氣管之上氣管即喉嚨也居於前主持呼吸為聲音之門戶故名吸門共十二節上三節微小下九節微大第四乃結喉也楊玄操曰喉嚨空虛也言其中空虛可以通氣息焉即肺之系呼吸之道路金鑑曰結喉者喉之管頭也其瘦者多外見頸前肥人則隱於肉肉多不見經釋曰喉嚨即出聲之處即俗名喉脘會厭程氏醫彀曰綴於舌本之上正應於氣管之下氣管即喉嚨也醫學原始曰齒以後至會厭深三寸五分大容五合會厭為之吸門其大如錢為音聲之戶薄則易於起發音出快而便利厚則起發音出慢而重舌也久卒然無音者寒氣客於厭金鑑曰會厭者覆喉管之上竅似皮似膜發聲則開咽食則閉故為聲音之戶也懸壅垂金鑑曰懸壅垂者張口視喉上似乳頭之小舌俗名碓嘴醫學原始曰喉上如小舌而下垂者曰懸壅乃音聲之關也吳昆曰懸壅吸門垂下肉乳也頏顙金鑑曰口內之上二孔目分氣之竅也喉嚨金鑑曰喉嚨者喉也肺之系也嗌金鑑曰嗌者咽也胃之系也咽喉憂恚無言篇曰咽喉者水道之道也喉嚨者氣之所以上下者也類注曰人有二喉一軟一硬軟者居後是謂咽喉乃水穀之道通於六府者也硬者居前是謂喉嚨為宗氣出入之道所以行呼吸通五藏者也鼻陰陽應象大論曰肺主鼻又曰在竅為鼻醫學原始曰肺主鼻鼻者肺之官故肺和則鼻能知香臭矣皮毛痿論曰肺主身之皮毛皮部論曰百病之始生也必先於皮毛邪中之則腠理開開則入容於絡脈留而不去傳入於經脈留而不去傳入於府腸楊玄操曰腸暢也通暢胃氣去滓穢者也醫學原始曰廣腸一曰肛門肛門言其處似車釭形故曰肛門即廣腸也一名直腸一名魄門一名洞腸亦名肛門受大腸之谷而道出焉營升按大小腸古經皆以為二物然解體親視之唯一腸而有巨細之分耳今以曲尺度之長二丈四五尺許上屬於胃下連肛門其色白帶淡紅四十二難十四經針灸聚英等大腸當臍右環十六曲腸胃篇當臍左旋五藏別論曰夫胃大腸小腸三焦膀胱此五者天氣之所生也左旋故二腸亦左旋腸胃篇當臍左旋是胃楊玄操曰胃圍也言圍受食物也玉機真藏論曰五藏者皆稟氣於胃胃者五藏之本也刺瘧論曰胃者六府之長也張介賓曰胃者六府之長而大腸小腸皆與胃連居胃下氣本一貫故皆屬於胃醫學原始曰口內通於腹中只有二竅前曰喉是肺管後曰咽是食管也即胃脘也下即賁門亦透膈而下是胃胃下有幽門即接小腸小腸下是闌門闌門接大腸大腸透肛門穢從此出闌門之傍有膀胱連於前陰而出溺醫學原始曰紆曲屈伸長二尺六寸大一尺五寸徑五寸盛谷二斗水一斗五升藏府性鑑曰咽至胃長一尺六寸通之咽門胃上口即為賁門當中脘主腐熟水穀胃下口即小腸上口名曰幽門經脈別論曰食氣入胃其清純津液之歸於心入於脈變赤而為血有餘則注於衝任而為經水經水者陰水也陰必從陽故其色赤稟火之色也且沖為血海任主胞胎若媾男子之精陰陽和合而成孕則其血皆移蔭於胎矣胎既産則胃中清純津液之氣歸於肺朝於脈流入於乳房變白而為乳是稟肺金之色也其或兒不自哺陽明之竅不通其胃中津液仍歸於脈變赤而復為月水也醫彀曰婦人血與乳俱脾胃所生脾藏府性鑑曰膈膜之下有胃盛受飲食而熟腐之其左有脾與胃同膜而附其上其色如馬肝赤紫又曰磨胃食乃消化入門曰居中脘一寸二分上去心三寸六分下去腎三寸六分中間一寸二分名曰中庭在天為太陽在地為太陰在人為中黃祖氣脾氣壯則能磨消水穀以營養四藏滑氏曰脾廣三寸長五寸掩乎太倉附著於脊之第十一椎肉痿論曰脾主身之肌肉醫經原旨曰脾屬土肉象地之體故合肉也脾氣通於唇故榮唇也又曰肉屬衆體之土心藏府性鑑曰肺下即心心有系二繫於肺肺受清氣下乃灌注其象尖長而圓其色赤又曰凡脾胃肝膽腎膀胱俱各有一系繫於包絡之旁以通於心口問篇岐伯曰心者五臟六腑之主也醫學原始曰心為百體之君元火府生命之根靈神之寓故四藏皆繫於心而次第生焉又曰心為靈君萬念皆生於此又曰心為一身之君主稟虛靈而含造化具一理以應萬幾藏府百骸惟所是命故曰神明出焉醫學原始元命包曰心者火之精成於五故人心長五寸血痿論曰心主身之血脈陰陽應象大論曰在竅為舌舌為心之苗故主舌靈樞決氣篇曰何謂血岐伯曰中焦受氣取汁變化而赤是謂血發醫學原始曰頭上曰發屬足少陰陽明耳前曰鬢屬手足少陽目上曰眉屬手足陽明唇上曰髭屬手陽明頦下曰須屬足少陰陽明兩頰曰髯屬足少陽其經氣血盛則美而長氣多血少則美而短氣少血多則少而惡氣血俱少則其處不生氣血俱熱則黃而赤氣血俱少則衰白而落浩然曰驗小兒壽夭亦視毛髮兒發受母血而實故名血餘也母血充實兒發則黑而光潤母血虛弱或胎漏敗墮或縱欲多淫兒發則黃槁焦枯或生疳痍之患俱關不壽之兆也萬病回春曰發者血之餘也舌甲乙經曰舌者心之官心氣通於舌心和則舌知五味又曰舌重十兩長七寸廣二寸半陰陽應象大論曰心在竅為舌腎在竅為耳此云開竅於耳則耳兼心腎也醫彀曰南方赤色入通於心開竅於耳注曰舌為心之官當言於舌用非竅故云耳也蓋手少陰之絡會於耳中故也楊玄操曰舌者泄也言可舒泄於言語也虞庶曰舌者聲之機金鑑曰舌者司味之竅也膀胱醫彀曰膀胱者與小腸脂蔓相聯有下口而無上口其管直透前陰出溺藏府性鑑曰心胃中熟腐水穀其精氣自胃之上口曰賁門上輸於肺肺乃播於百脈其滓穢自胃之下口曰幽門傳於小腸至小腸下口曰闌門泌別其汁清者滲出小腸而滲入膀胱滓穢之物則轉入大腸矣膀胱下無所入之竅止有下口腎全狀前面之圖其色茶褐中間白色有兩枚形圓長長三寸許著脊十四椎左右兩筋下通於莖精水由此通其藏在腸胃之後橫割腎觀之中間白色如人精臭亦相類有數緊疑是精液所留乎腎背面之圖藏府性鑑曰腎有系二條上條繫於心包下條過屏翳穴後趨脊骨頤生微論李士材曰父母構精未有形象先結河車中間透起一莖如蓮蕊初生乃臍帶也蕊中一點實生身立命之原即命門也自此天一生水先結兩腎夫命處於中兩腎左右開合正如門中根闑故曰命門蓋一陽處於二陰之間所以成乎坎也按銅人圖脊骨自上而下十四節自下而上七節有命門穴兩旁有腎俞穴則知中是命門兩旁皆腎也臍與命門生於百體之先故命門對中易曰一陽陷於二陰之中命門猶儒之太極也醫學原始浩然曰人始生臍與命門故命門為十二經脈之主一曰真火一曰真氣一曰動氣真火者人身之太極無形可見先天一點之元陽兩腎之間是其息所人無此火則無以養生曰真氣者稟於有生之初從無而有即元氣之本體也曰動氣者蓋動則生亦陽之動也命門具而兩腎生兩腎者靜物也靜則化亦陰之靜也命門者立命之門元火元氣之息所造化之樞紐陰陽之根帶即先天之太極四行由此而生臟腑以繼而成腎經錦囊祕録曰兩腎俱屬水左為陰水右陽水以為命門非命門在兩腎中間命門左邊小黑圈是真水之穴命門右邊小白圈是相火之穴此一水一火俱無形日夜潛行不息蓋命門居兩腎之中間而不偏於右而婦人子宮之門戶也子宮者腎藏藏精之府也當開元氣海之間男精女血皆聚於此為先天真一之氣所謂坎中之真陽為一身生化之源在兩腎中間而不可偏於右兩腎屬水有陰陽之分命門屬火在二陰之中若謂左主於腎而右偏為命門此千古傳說之僞也質疑録曰內經初無命門之名命門之說始於越人之三十六難而曰腎有兩左為命門男子藏精女子系胞夫右腎既藏男子之精則左腎將藏何物女子之胞何獨偏繫於右此其說之不能無疑也命門居兩腎之中而不偏於右即婦人子宮之門戶也子宮者腎臟藏精之府也當關元氣海之間男精女血皆聚於此為先天真一元氣所謂坎中之真陽為一身生化之原此命門在兩腎中間而不可以獨偏於右兩腎屬水有陰陽之分命門屬火在二陰之中故脈經以腎脈配兩尺但當曰左腎主真陰右尺主真陽而命門則為陽氣之根隨三焦相火以同見於右尺則可若謂左腎則主於腎而右腎偏為命門此千古訛傳之弊而不得不亟正之者也耳陰陽應象大論曰腎主耳又曰在竅為耳骨宣明五氣篇曰腎主骨說文曰骨者體之質也肉之核也頭顱骨醫彀曰男子骨色純白婦人骨色淡黑男子髑髏骨自項及耳至腦後共八片腦後橫一縫當正直下發際別有一直縫婦人只六片腦後橫一縫當正直下則無縫左右肋男十二條八長四短女十四條八長六短類注曰肋骨各十二條八長四短女人多擎夫二條左右各十四條吳醫匯講曰男子肋骨二十有四女子肋骨二十有八男子頭骨八塊女子頭骨六塊類注曰尾骶骨男子尖女子者圓而平金鑑曰顛頂骨男子三叉縫女子十字縫齒醫學原始曰齒屬腎腎乃骨之餘上齗屬胃下齗屬大腸何少年齒密老年齒疏而齒性厚剛故有收縮而致稀疏者乎艾儒略曰齒形上平寬下稍鋭而人身百體之長有時而止惟齒則自少而壯至老益加長焉膽楊玄操曰膽敢也言其人有膽氣果敢也李中梓曰膽者擔也猶人正直無私善擔當也藏府性鑑曰膈膜之下有肝肝有獨葉者有二三葉者其系亦上絡於心包為血之海上通於目下亦無竅有膽附於短葉間六節藏象論曰凡十一藏皆取決於膽類注曰五藏六府共為十一稟賦不同情志亦異必資膽氣庶得各其用故皆取決於膽也又曰膽稟剛果之氣故為中正之官而決斷所出膽附於肝相為表裡肝氣雖強非膽不斷肝膽相濟勇敢乃成肝藏府性鑑曰膈膜之下有肝肝有獨葉者有二三葉者入門曰肝之系者自膈下著右脅肋上貫膈入肺中與膈膜相近人鏡經曰肝藏主筋膜之氣也其位居右脅之前並胃著脊之第九椎營升按肝者膈膜下低於胃之右其形大約似肺藏其色如蜀黍上連心系而垂膈下上書所云左三右四未見其然否肝後面膽與肝相連風論曰善怒時憎女子吳注曰肝志怒肝脈環陰器肝氣治則悅色而欲女子肝氣衰則惡色而憎女子睪丸圖翼曰音高陰丸也金鑑曰睪丸者男子前陰兩丸也陰器張氏曰陰器者合太陽厥陰陽明少陰之筋以及衝任督之脈皆聚於此故曰宗筋厥陰屬肝肝主筋故絡諸筋而一之以成健運之用廷孔類注曰女人溺孔在前陰中橫骨之下男子溺孔亦在橫骨之下中央為宗筋所函故不見耳馬氏曰廷孔也其孔即溺孔之端蓋窈漏之中有溺孔其端正在陰廷乃溺孔之端也醫學原始曰前陰亦一而有兩竅者廷孔與溺孔也溺孔在前廷孔在後一道而兩用在出之戶也又曰廷孔者即出精之道從尾閭上通兩腎之間男子以藏精女子以系胞故曰腎間動氣人之生命也腎間者兩腎之命門真元之所也此五臟六腑之本十二經脈之根呼吸之門三焦之原又曰惟腎亦有系通於前陰而泄精眼目人鏡經曰肝氣通於目目和則知黑白矣醫學原始曰目為五官之尊以視為職又曰目之上下生睫毛者以飛塵之侵即汗下亦不能注入也又曰暗中閉目以手按摩內光忽見何也蓋目中原有自然之微光不激動則不發見以手按摩則激動其光世俗所謂神光爾醫學原始曰口問篇岐伯曰心者五臟六腑之主也目者宗脈之所聚也金匱真言論曰東方青色入通於肝開竅於目醫學原始曰人之情僞先觀其目此心捷報也心有一情目即露之筋宣明五氣篇曰肝主筋六節藏象論類注曰人之運動由乎筋力甲乙經曰肝者筋之合也筋者聚於陰器而脈絡於舌本故脈弗營則筋縮急筋縮急則引卵與舌故唇青舌卷卵縮則筋先死爪本藏篇曰肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結六節藏象論類注曰爪者筋之餘故其華在爪腦髓經脈篇曰人始生先成精精成而腦髓生類注曰精藏於腎腎通於腦腦者陰也髓者骨之充也諸髓皆屬於腦故腦成而後腦髓生華本本草備要莘夷之條下金正希先生嘗語余曰人之記性皆在腦中小兒善忘者腦未滿也老人健忘者腦漸空也凡人外物必有一形影留於腦昂思今人每記憶往事必閉目瞪而思索之此即凝神於腦之意也李時珍曰腦為元神之府胞衣表面胤嗣全書曰胞之蒂起於兩腎中間著脊而生懸胎於胞通母之氣血內含漿水以養兒身頭與手足幡作一團如卵之黃其漿水如卵之白使上下四旁皆不得相礙時珍曰胎在母腹臍連於胞胎息隨母人鏡經曰臍帶一系繫於兒臍懸兒於胞中此通母之氣血遺蔭之路也醫門祕旨曰臍帶與母之真氣相連如果生枝上乃一身之根本也保産萬全書曰按是連紫河車皮膜內含漿水兒生下則四破經脈篇曰人始生先成精精成而腦髓生醫學原始曰人之始生先臍與命門故為十二經脈之主千金方曰人稟天地而生故內有五臟六腑精氣骨髓筋脈外有四肢九竅皮毛爪齒咽喉唇舌肛門胞囊以總而成軀醫彀曰有言其臟腑生成之次第者若陰包陽者為男先生右腎陽包陰者為女先生左腎其次腎生脾脾生肝肝生肺肺生心以生其勝已腎屬水故五臟由是為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生三焦以生其已勝者小腸屬火故六腑由是為陽其次三焦生八脈八脈生十二經十二經生十五絡十五絡生一百八十系絡系絡生一百八十纏經纏經生三萬四千孫絡孫絡生三百六十五骨節骨節生三百六十五大穴大穴生八萬四千毛竅則耳目口鼻四肢百骸之身備矣脈經義解曰小兒初生方赤子産論曰凡兒生當長一尺六寸重十七斤七衝門出於四十四難評林曰沖通也要也為衝要之地唇為飛門齒為戶門會厭為吸門賁門胃上口也水穀自此入於胃幽門為下口也水穀滓穢自此入於小腸醫彀曰上接胃即幽門原始曰胃下有幽門即接小腸小腸下是闌門接大腸瘡瘍經驗全書曰咽門廣二寸半至胃一尺六寸喉嚨廣二寸長一尺二寸原始曰十二節上三節微小下九節微大第四節乃結喉也醫彀曰闌門下通大腸又曰闌住水穀主泌別清濁故曰闌門清者滲入膀胱醫彀曰溺出前其精管自兩腎脊骨間發來繞大腸之右溺管下同出前陰而泄精醫學原始曰齒以後至會厭深三寸五分大容五合會厭為之吸門其大如錢為音聲之戶薄則易於起發音出快而便利厚則起發音出慢而重舌也人卒然無音者寒氣客於厭則厭不能發發不能下錢豫齊曰會厭綴於舌本之下正應乎氣管之上氣管即喉嚨也居於前主持呼吸為發音之門戶故名吸門共十二節上三節微小下九節微大第四節乃結喉也結喉可容得上三節於內如飲食則結喉即起套於上三節之外直抵於會厭之下而掩之令水穀不得而漏入焉一或誤投之即發嗆而不已矣醫學原始曰惟腎亦有系通於前陰泄精又曰前陰亦一而有兩竅者廷孔與溺口也溺口在前廷孔在後一道而兩用又曰廷孔者即出精之道循尾閭上通兩腎之間評林曰按內經並無七衝門又曰今越人言七沖者以飲食入於唇碎於齒受於會厭腐熟太倉而出下口輸於小腸大腸出肛門衝要通達以立命根故謂衝門張世賢曰沖者通也要地也此七衝門者水穀衝要通利開闔之所是也謂之七衝門也俗解曰此七沖者皆水穀變化相沖出入之門路也評林曰此則自唇至肛門自上而下凡飲食之既納而出入衝要通達非他處可擬也故曰七衝門也飛門唇戶門齒吸門會厭賁門胃之上口幽門胃之下口闌門小腸下口魄門肛門張氏圖翼曰命門氣門新增入於二門為九門命門精血之門居前陰中氣門溲溺之門居前陰中由氣化而出故曰氣門飛門靈樞憂恚無言篇曰口唇者音聲之扇也注曰唇啓則聲揭故謂之扇張世賢曰兩唇動運如物之飛楊氏曰脾主於唇為飛門也飛者動也言唇受水穀動轉入於門也戶門俗解曰飲食由此得入如家室之門戶也評林曰齒之在人為戶門焉凡物之大者不得徑入必得齒以碎之然得入其上下開闔如室之有戶也會厭丁氏曰會厭為吸門者咽喉為水穀下時厭接呼吸也俗解曰會厭咽門也吸入也會厭為吸門咽物吸入而不得復出評林曰會厭在人為吸門焉當咽物之時咽物吸入合掩喉嚨不使食物誤入以阻氣之噓吸出入故謂吸門醫學綱目曰咽與喉會厭與舌四者同在一門而其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭宮乎其上以司開闔掩其喉則其食下不掩之其喉錯必舌抵上齶則會厭能閉其喉矣四者交相為用闕一則飲食廢而死矣賁門俗解曰胃為賁門食飲下咽賁向聚於胃也滑氏曰賁與奔同言物之所奔向也幽門俗解曰太倉亦胃也太倉下口為幽門在臍上二寸謂居幽暗之處也闌門丁氏曰大腸小腸會為闌門會者合也大腸小腸合之處分闌水穀精血各有所歸故曰闌門俗解曰大腸小腸會為闌門者是大腸小腸各受物傳化而相會於此分別清濁渣粕穢濁入廣腸水液滲泄入膀胱關闌分隔也評林曰闌遮也大腸小腸會為闌門焉當小腸之下口至是而泌泄清濁焉水液入膀胱渣滓入大腸有遮闌之義故曰闌門魄門五臟別論曰魄門亦為五藏使水穀不得久藏丁氏曰下極為魄門大腸者肺之府藏其魄大腸下名肛門又曰魄門俗解曰下極肛門也下極為魄門主出不主內上通於肺肺藏魄故曰魄門
