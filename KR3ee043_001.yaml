body:
  text: 卷一手太陰肺經內經知要曰首言肺者肺朝百脈也循序相傳盡於肝經絡而復始又傳於肺是為一周雲門馬氏分寸歌曰雲門璇璣旁六寸經脈篇馬注曰挨穴之法由天突起至璇璣由璇璣至雲門其法甚簡營升按諸書以為本經之穴始於中府而標幽賦曰穴出雲門抵期門又蠡海集曰人身經絡始於雲門終入於期門又錦囊祕録曰人之氣血周行無間始於手太陰出雲門穴歸於足厥陰肝經入於期門穴今考其經行之循序則以雲門為始者是近中府雲門下一寸乳上三肋間動脈應手陷中天府十四經合參曰腋下三寸動脈中以鼻取之營升按針方六集曰一法以手伸直用鼻尖點到處是穴又法垂手與乳相平是穴又醫學原始曰取法用鼻尖點臂上到處是穴雖有此等之說於腋下三寸動脈中取之為是俠白天府下去肘五寸動脈中營升按壽世保元曰先於乳頭上塗墨令兩手直伸夾之染墨處即是穴雖有此說於去肘五寸動脈中取之為是尺澤醫學原始曰在肘中約紋上與曲池相近動脈中孔最去腕上七寸列缺醫學原始曰在腕骨上側一寸五分取法以手交叉食指點處是穴兩骨罅中吳昆方考脈語曰反關者不行於寸口由列缺絡入臂後手陽明大腸經也以其不順行於關上故名曰反關有一手反關者有兩手反關者此得於有生之初已然非為病也古今醫統曰人有寸關尺三部脈不見自列缺至陽溪見者俗謂反關脈此經虛而絡脈滿李士材診家正眼曰脈不行於寸口由列缺絡入臂後手陽明大腸經也以其不正行關上故曰反關必反其手而診之乃可見也左手得之主貴右手得之主富左右俱反富而且貴男女皆然經渠醫學原始曰在手寸口脈陷中一法用食指交叉列缺為準次取食指爪甲角下是穴也大淵神應經曰在掌後內側橫紋頭動脈魚際大指本節後內側散脈中營升按張介賓曰手腕之前大指本節之間其起肉隆起形如魚者統調之魚寸口之前魚之後曰魚際穴也此說為是又張志聰曰魚際者手足之白肉際隆起所有如魚腹而穴在其際也手之魚際肺之脈氣所發足之魚際脾之脈氣所發也又堀亢厚曰凡手足分肉隆起而似臥魚之腹者通呼謂之魚又謂之魚腹其四邊分際總謂之魚際少商大指端內側去爪甲如韭葉白肉宛宛中營升按韭葉者言少許也手太陽小腸經少澤穴去爪甲角一分下皆仿此手太陰穴起自中府中府在雲門下一寸去任脈中行天突之下一寸璇璣璇璣之旁六寸乳上三肋間陷中動脈應手仰而取之循行臂臑內廉腋下三寸為天府天府下去肘上五寸為俠白肘中約文上屈肘橫文筋骨罅中動脈為尺澤腕上七寸陷中為孔最腕後側上一寸五分為列缺寸口陷中為經渠手掌後陷中為大淵手大指本節後內側陷中又云散脈中白肉際為魚際手大指內側端去爪甲角如韭葉白肉際宛宛中為少商圖示兩手交叉當食指盡處為列缺穴針灸大成曰手太陰絡別走陽明去腕側上一寸五分以兩手交叉食指盡處兩筋罅中又醫學原始曰經渠一法用食指交叉列缺為準次取食指爪甲角下是穴也叉說文手指相錯也張介賓曰寸口之前魚之後又醫彀曰節後散脈里此二說為是也吳升曰手足黑白肉分之處如魚腹色者曰魚際又張志聰曰魚際者謂手足之白肉隆起所有如魚腹而穴在其際營昆按神應經魚際穴奇俞大骨空在手大指第二節前尖上屈指當骨節中恐神應經魚際穴此類歟滑氏曰手太陰起於中焦受足厥陰之交也由是循任脈之外足少陰經脈之裡以次下行當臍上一寸水分穴之分繞絡大腸其支者從肺系出而橫行循胸部第四行之中府雲門以出腋下循臑內歷天府俠白行手少陰手心主之前下入肘中抵尺澤穴也既下肘中乃循臂內上骨之下廉歷孔最列缺入寸口之經渠大淵以上魚循魚際出大指之端至少商穴而終也其支者從腕後列缺穴達次指內廉出其端而交於手陽明手陽明大腸經入門曰卯時自少商穴交與商陽循肘上行至鼻傍迎香穴止商陽手大指次指內側去爪甲角如韭葉營升按甲乙經脈經子午經手陽明大腸之脈起於大指次指之端外側其穴則甲乙經在手大指次指內側去爪甲如韭葉諸書皆有內側二字故雖陽經姑從甲乙二間手大指次指末節前內側陷中醫學原始曰在次指本節前內側橫紋尖盡處陷中三間手大指次指本節後內側陷中醫學原始曰在次指本節後內側橫紋盡處陷中合谷手大指次指岐骨陷中陽溪針方六集曰在手腕上側橫紋前兩筋間陷中偏歷十四經合參曰手陽明絡別走太陰在腕後三寸取之又曰兩手交叉以中指盡處是穴溫溜徐氏馬氏入門醫彀等在腕後五寸營升按甲乙經千金方針方六集小士五寸大士六寸聖濟總録銅人經聚英大士五寸小士六寸發揮曰小士六寸大士五寸聖惠方腕後五寸六寸間醫學綱目小士大士乃小兒大人也大士小士之說諸書異未詳小兒臂長指短故曰小士六寸大人臂短指長故曰大士五寸乎然以周身寸量之則不可有大士小士之別是以考之諸書或言五寸或言六寸又五寸六寸之間其說區區無一定之說矣不可拘大士小士之說但以腕後五寸為是亦握手視之有分肉如蛇頭之形此地肌肉隆起象似蛇頭故以名此即溫溜穴是也一名蛇頭下廉圖翼曰曲池下四寸上廉圖翼曰曲池下三寸三里曲池下二寸按之肉起曲池太平聖惠方曰在肘外輔骨曲肘橫文頭宛宛中陷者是其穴營升按徐氏大全醫學入門肘外輔屈肘兩骨中紋頭盡處明堂灸經神應經針灸大成醫宗金鑑千金方肘外輔骨曲肘橫文頭陷中本事方曰臂相連處紋盡處是穴此等說亦為是肘髎圖翼曰在肘大骨外廉陷中與天井相併相去一寸四分五里醫學原始曰在肘上三寸行向里大脈中央一法在曲池橫紋尖盡上二寸是穴營升按五里穴氣穴論曰大禁二十五在天府下五寸王注曰五里穴也中島玄俊以五里穴移入於手太陰肺經然不可從臂臑肘上七寸肩髃肩端兩骨間陷者宛宛中舉臂有空骨空論曰舉臂肩上陷者灸之王注曰謂肩髃巨骨肩端上行兩叉骨間陷中天鼎醫宗金鑑曰頸缺盆上直行扶突下一寸扶突十四經合參曰人迎後一寸五分禾髎鼻孔下挾水溝旁五分迎香醫學原始曰在鼻孔兩旁直紋是穴一法禾髎上一寸鼻孔旁五分手陽明經接太陰肺經而起自食指內側去爪甲角如韭葉之商陽循食指本節前內側陷中為二間本節後內側陷中為三間大指次指歧骨間陷中為合谷手腕中上側兩筋間陷中為陽溪手腕後三寸為偏歷手腕後小士五寸大士六寸為溫溜握手見肌肉長起如蛇頭者是也肘外輔骨屈肘曲骨之中為曲池曲池下二寸為三里下三寸為上廉下四寸為下廉曲池上三寸為五里上七寸為臂臑曲池與五里之間向外稍斜為肘髎當膊骨頭肩端上兩骨罅陷中為肩髃肩尖上行兩叉骨間陷中為巨骨頸中人迎後一寸五分為扶突扶突後一寸為天鼎直鼻孔下夾水溝旁五分為禾髎禾髎上一寸鼻孔旁五分為迎香由人中而左右互交者也醫學原始曰以手交叉食指點處是穴十四經合參曰兩手交叉以中指盡處是穴握手見之有分肉如蛇頭之形此地肌肉長起象似陀頭故以名此則溫溜穴是也一名蛇頭滑氏曰受手太陰之交行於陽之分也由是循指上廉歷二間三間以出合谷兩骨之間復上入陽溪兩筋之中自陽溪而循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池循臑外廉歷肘髎五里臂臑絡臑會上肩至肩髃穴也循巨骨穴上出柱骨之會上會於大椎滑氏曰自大椎而下入缺盆循足陽明經脈外絡繞肺臟復下膈當天樞之分會屬於大腸又曰其支別者自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中復出夾兩口吻相交於人中之分左脈之右右脈之左挾鼻孔循禾髎迎香而終以交於足陽明也圖翼曰缺盆為五臟六腑之道華他內照圖曰膻中名氣海在兩乳之間為氣之海也氣所屬焉能分布陰陽氣者主源乃命之主針方六集曰膻中居兩乳間是為氣之所會足陽明胃經醫學入門云辰時自迎香交與承泣穴上行至頭維對人迎循胸腹下至足指厲兌穴止至真要大論曰帝曰陽明何謂也岐伯曰兩陽合明也類注曰陽之盛也承泣目下七分直瞳子王惟一銅人腧穴針灸圖經徐三友銅人俞穴針灸圖經針灸大成施沛沛然經穴指掌圖醫學原始頭維下關頰車承泣循序醫學入門程氏醫彀自迎香交與承泣穴上行至頭維對人迎循胸腹至足厲兌穴止圖穴起自頭維行氣實自承泣始也四白目下一寸直瞳子巨髎鼻孔旁八分直瞳子地倉挾口吻旁四分大迎曲頷前一寸三分骨陷中動脈頰車耳下曲頰端陷中下關客主人下耳前動脈下廉合口有空開口則閉頭維額角髮際本神旁一寸五分神庭旁四寸五分人迎頸大脈動應手挾結喉旁一寸五分寒熱病篇曰頸側之動脈人迎人迎足陽明也在嬰筋之前滑氏曰古以夾喉兩旁為氣口人迎至晉王叔和直以左右手寸口為人迎氣口千金方外臺祕要針灸大成頸大脈動應手夾結喉兩旁一寸五分仰而取之以候五藏氣水突醫學入門云直人迎下氣舍上二穴之中氣舍頸直人迎下挾天突陷中缺盆針方六集云在肩上橫骨陷中挾天突兩傍各四寸圖翼曰為五藏六府之道氣戶巨骨下俞府旁二寸陷中庫房氣戶下一寸六分陷中營升按滑氏發揮曰氣戶下一寸六分陷中明堂灸經所謂輸府下一寸即華蓋傍二寸也華蓋穴甲乙經千金方銅人經外臺祕要資生經針方六集古今醫統醫學原始十四經合參諸書為璇璣下一寸陷中據於任脈觀之六分二字宜削去屋翳醫學綱目云庫房下一寸膺窗屋翳下一寸六分陷中乳中當乳是營升按此穴諸說甚多聖濟總録針灸大成為當乳中是古今醫統乳中當乳之中醫彀兩乳中心名乳中入門原始乳中即乳頭上此說為是針灸聚英云丹溪曰乳房陽明胃所經乳頭厥陰肝所屬乳根乳下一寸六分陷中醫學正傳曰婦人在乳房下起肉處陷中壽世保元曰在正直乳下容一指許骨間陷中婦人則屈乳頭度之乳頭齊處是穴經絡全書曰虛里乳根穴分也俗謂之氣眼甲乙經曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應手脈之宗氣也類注曰宗氣不固而大泄於外中虛之候也虛里跳動最為虛損病本故凡患陰虛勞怯則心下多有跳動及為驚悸慌張者即此證人止知其心跳而不知虛里之動也但動之微者病尚微動之甚者病則甚也不容幽門旁相去各一寸五分營升按自不容至歸來去腹中行廣狹諸賢之說不同十四經發揮徐三友銅人經千金方外臺資生經石本銅人經金鑑自不容至氣衝去腹中行二寸甲乙經聚英醫統大成自不容至滑肉門去腹中行三寸自天樞至氣衝去中行二寸針方六集自不容至滑肉門二寸五分自天樞至氣衝挾臍各二寸千金方脾藏云長谷俠臍相去五寸明堂灸經聖惠方上管兩旁一寸醫學原始自不容至滑肉門去腹中行二寸自天樞至氣衝去腹中行三寸入門不容穴平巨闕傍三寸天樞平臍傍三寸諸說紛紛不能無疑矣十四經千金方外臺聖濟總録銅人經資生經金鑑所說為是承滿不容下一寸梁門承滿下一寸關門梁門下一寸太乙關門下一寸滑肉門太乙下一寸天樞挾臍二寸外陵天樞下一寸大巨外陵下一寸水道針灸聚英十四經合參等在大巨下二寸注證分寸歌曰樞下四寸歸來徐氏大全曰水道下一寸氣衝醫學綱目曰臍下兩旁陰毛際橫骨端宛宛中有動脈是也西方子明堂曰引刺熱論注曰在腹臍下橫骨兩端鼠鼷上一寸動脈應手骨空論曰毛際動脈人鏡經醫學原始等曲骨旁三寸來施沛沛然經穴指掌圖氣衝曲骨傍三寸求程氏醫彀曰曲骨傍三寸為是也髀關圖翼馬氏歌等膝上一尺二寸伏兔膝上六寸起肉正跪坐而取之陰市膝上三寸梁丘膝上二寸犢鼻醫學入門曰在膝頭眼外側大筋陷中醫宗金鑑曰從梁丘下行遇膝蓋骨䯒骨上陷中俗名膝眼此處陷中兩旁有空狀如牛鼻在外側者三里膝眼下三寸又曰極重按之則趺上動脈止矣得效方曰以手約膝取中指梢盡處是穴巨虛三里下三寸舉足取之條口下廉上一寸舉足取之巨虛下廉上廉下三寸舉足取之入門曰三里下六寸豐隆銅人針灸圖經曰外踝上八寸甲乙經千金方聖惠方資生經外臺祕要聖濟總録等外踝上八寸解溪醫學原始曰在足腕上衝陽後寸半系鞋處一法去內庭上六寸半營升按此穴剌瘧論注在衝陽後三寸半氣穴論注二寸半甲乙經圖翼發揮醫學原始以衝陽後一寸五分去內庭上六寸半為是衝陽足趺上五寸骨間動脈去陷谷三寸營升按醫宗金鑑曰足趺上腳面高骨間動脈張氏曰即仲景所謂趺陽脈是也銅人經發揮等去陷谷三寸針灸大全醫學入門去內庭五寸俱為是陷谷針灸大成曰足大指次指外間本節後陷中去內庭二寸營升按甲乙經千金方外臺祕要聖濟總録針灸聚英針灸資生經神應經針方六集醫學入門等皆云去內庭二寸此說為是醫學原始曰在足二指內側本節後陷中去內庭一寸此說非也內側二字恐誤何則足陽明胃經陽經也取之內側則屬陰經謬誤可知也針灸大成曰足大指次指外間本節後去內庭二寸此說尤為得之內庭足大指次指外間厲兌針方六集曰在足大指次指之端外側向中指邊去爪甲如韭葉足陽明經接自手陽明迎香穴而起於目下七分上直瞳子陷中之承泣循目下一寸為四白夾鼻孔旁八分為巨髎夾口吻旁四分為地倉在曲頷前一寸三分骨陷中動脈為大迎在耳下曲頰端近前陷中為頰車客主人下耳前動脈為下關額角入髮際為頭維頸下夾結喉旁一寸五分大動脈應手為人迎頸筋前直人迎下夾氣舍為水突下夾天突邊陷中為氣舍在肩上橫骨陷者中為缺盆巨骨下夾俞府兩旁各二寸去中行四寸陷中為氣戶氣戶下一寸六分為庫房庫房下一寸六分為屋翳屋翳下一寸六分為膺窗當乳之中為乳中乳中下一寸六分為乳根第四肋端幽門旁一寸五分去中行二寸為不容不容下一寸為承滿承滿下一寸為梁門梁門下一寸為關門關門下一寸為太乙太乙下一寸為滑肉門夾臍旁二寸為天樞天樞下一寸為外陵外陵下二寸為大巨大巨下三寸為水道水道下二寸為歸來歸來下鼠鼷上一寸動脈應手宛宛中去中行二寸為氣衝膝上伏兔後交紋中為髀關膝上六寸起肉間正跪坐而取之為伏兔膝上三寸拜而取之為陰市圖示正跪坐而取之膝上有肉起如兔狀即伏兔穴膝上二寸兩筋間為梁丘循膝臏下胻骨上骨解大筋陷中形如牛鼻為犢鼻膝眼下三寸胻骨外廉大筋內宛宛中為三里三里下三寸為上巨虛下五寸為條口上廉下三寸兩筋骨陷中為下巨虛外踝上八寸為豐隆足跗上五寸高骨間動脈為衝陽衝陽後一寸五分為解溪足大指次指外間本節後陷中為陷谷外間陷中為內庭次指端去爪甲如韭葉為厲兌足陽明起於鼻兩傍迎香穴由是而上左右相交於頞中過晴明之分下循鼻外歷承泣四白巨髎入上齒中復出循地倉挾兩口吻環繞唇下左右相交於承漿之分也自承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際行懸釐頷厭之分經頭維會於額顱之神庭其支別者從大迎前下人迎從喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾其直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣衝中也自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下至氣衝與前之入氣衝者合督脈神庭足太陽陽明膀胱經晴明手足太陽少陽任脈上脘足陽明手太陽督脈之會足陽明五脈之會任脈之會膽經客主人懸釐頷厭共手任脈承漿足陽明任脈之會任脈中脘手太陽少陽足陽明所生任脈之會會陽明所生任脈之會既相合氣衝中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循䯒外廉之三里巨虛上廉條口巨虛下廉豐隆解溪下足跗之衝陽陷谷入中指外間之內庭至厲兌而終也其支者自趺上衝陽穴別行入大指間斜出足厥陰行間穴之外循大指下出其端以交於足太陰足陽明之別名曰豐隆去踝八寸別走太陰據此則本經自豐隆別出者不入中指外間者明矣其支者自趺上衝陽穴別行入大指間斜出足厥陰行間穴之外循大指下出其端以交於足太陰足太陰脾經醫學入門曰巳時自衝陽過交與足指隱白循腿腹上行至腋下大包穴止隱白足大指內側端去爪甲角如韭葉大都足大指本節後陷中大白足內側核骨下陷中神應經曰在足大指內側大都後一寸下一寸公孫徐氏大全曰在大指內側去本節後一寸醫學入門曰太白後一寸陷中商丘圖翼曰內踝下微前陷中前有中封後有照海此穴居中神應經針灸大成共同三陰交內踝上三寸骨下陷中營升按神農皇帝針灸圖甲乙經外臺祕要聖濟總録銅人腧穴針灸圖經針灸資生經針灸聚英醫學入門針灸大成醫學原始醫宗金鑑等皆云內踝上三寸骨下千金方聖惠方明堂灸經俱為內踝上八寸神應經圖翼針灸經驗方為內踝上除踝三寸骨下陷中此穴千金翼方所謂內踝上一尺名三陰交者而今世俗稱手一束者是也漏谷內踝上六寸骨下陷中地機醫學入門曰膝下五寸大骨後陰陵泉膝下內側輔骨下陷中伸足取之血海醫學原始曰在膝臏上內廉赤白際二寸用手按於膝上大指向內廉中指向外廉指頭盡處是穴箕門針灸聚英醫學入門醫學原始經穴指掌圖等皆云血海上六寸陰股內動脈應手筋間衝門上去大橫五寸在府舍下橫骨端約中動脈府舍腹結下三寸醫宗金鑑曰衝門上七分腹結大橫下一寸三分大橫醫學入門曰平臍傍四寸半營升按甲乙經銅人經千金方外臺金鑑皆曰去腹中行三寸半注證發微十四經針灸聚英古今醫統大成入門資生經去腹中行四寸半針方六集去腹中行四寸甲乙經外臺針方六集腹哀下三寸銅人經聖濟總録聚英發揮大成原始合參腹哀下三寸半醫學綱目腹哀下二寸五分千金方腹哀下二寸八分考腹哀下一寸五分古今醫統腹哀下一寸三分以上諸說皆不同腹哀穴在期門下二寸期門下二寸即當臍上四寸也或云腹哀下三寸五分為大橫穴又云三寸又云二寸五分又云二寸又云一寸五分又云一寸三分以上之說俱不合骨度不可拘拘今取入門所說定為平臍傍四寸半腹哀日月下一寸五分營升按日月穴期門下五分期門巨闕旁四寸半巨關臍上六寸也分寸歌曰腹哀期下方二寸食竇針灸大成曰天溪下一寸六分去胸中行各六寸天溪胸鄉下一寸六分仰而取之對膻中胸鄉周榮下一寸六分仰而取之周榮中府下一寸六分仰而取之大包淵腋下三寸足太陰經接足陽明厲兌而起於足大指內側端去爪甲角如韭葉之隱白循大指本節後內側骨縫白肉際陷中為大都內側核骨下赤白肉際陷中為大白內側本節後一寸內踝前陷中為公孫內踝下微前陷中為商丘內踝上三寸骨下陷中為三陰交內踝上六寸骨下陷中為漏谷膝下五寸內側骨下陷中為地機膝下內輔骨下陷中為陰陵泉膝臏上一寸內廉白肉際陷中為血海魚腹上越兩筋間陰股內廉動脈應手為箕門上去大橫五寸當府舍下橫骨兩端約紋中動脈為衝門腹結下三寸去腹中行三寸半為府舍大橫下一寸三分為腹結腹哀下三寸五分平臍為大橫日月下一寸五分為腹哀天溪下一寸六分陷中為食竇胸鄉下一寸六分陷中為天溪周榮下一寸六分陷中為胸鄉中府下一寸六分陷中為周榮圖示本經大包穴系在淵腋下三寸與淵腋章門帶脈環跳諸穴均從腋下毛際中橫紋中之心經極泉穴直下足太陰起大指之端隱白穴受足陽明之交也由是循大指內側白肉際大都穴過核骨後歷大白公孫商丘上內踝前廉之三陰交也由三陰交上腨內循䯒骨後之漏谷上行二寸交出足厥陰經之前至地機陰陵泉自陰陵泉上循膝股內前廉之血海箕門經衝門府舍會中極關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘下脘之際以屬脾絡胃也由腹哀上膈循食竇天溪胸鄉周榮由周榮外曲折向下至大包又自大包外曲折向上會中府上行行人迎之裡挾咽連舌本散舌本而終也其支者由腹哀別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰中極關元皆三陰任脈之會下脘足太陰任脈之會日月足太陰少陽陽維之會期門足太陰任脈之會中府足太陰之會手少陰心經醫學入門曰午時自大包交與腋下極泉循臂行至小指少衝穴止極泉臂內腋下筋間動脈醫學入門十四經合參等無臂內二字青靈醫學原始曰在肘上三寸伸肘舉臂取之甲乙經千金方外臺祕要闕此穴少海醫學入門醫學原始等肘內廉橫紋頭盡處陷中靈道掌後一寸五分通里腕後一寸陰郤掌後脈中去腕五分醫學原始曰在神門後半分神門掌後鋭骨之端少府大全曰掌內手小指本節後醫統大成聚英等手小指本節後骨縫陷中少衝手小指內廉端去爪甲角如韭葉針方六集醫學入門針灸大成醫學原始等手小指內側去爪甲角如韭葉手少陰經起自腋下筋間動脈之極泉循肘上三寸為青靈肘內廉節後陷中為少海掌後一寸五分為靈道腕側後一寸陷中為通里掌後脈中去腕五分為陰郤掌後鋭骨端陷中為神門小指本節後骨縫陷中為少府小指內側端去爪甲角如韭葉為少衝手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸其支者從心系出任脈之外上行挾咽系目系其直者復從心系直上至肺臟之分出循腋下於極泉也自極泉下循臑內後廉行太陰心主兩經之後歷青靈穴下肘內廉抵少海自少海而下循臂內後廉神門入掌內廉至少府循小指端之少衝而終以交於手太陽也心為君主之官示尊於他藏故其交經授受不假於支別云手少陰經起於心循任脈屬心系下膈當臍上二寸之分絡小腸其直者復從心系卻上肺出腋下其支者從心系上挾咽系目系
