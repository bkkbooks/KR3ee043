宮入門曰十四椎各開三寸絶骨懸鐘一名絶骨陽輔一名髓孔大迎一名髓孔腰俞一名水分任水分醫學原始曰在分水旁各一寸半阿是穴千金方曰凡人吳蜀地遊官體上當須三兩處灸之勿令瘡暫瘥則瘴癘溫瘧毒氣不能著人也故吳蜀行灸必法阿是之注言人有病痛即令揑其上若里當其處不問孔穴即得便快成痛處即云阿是灸刺皆驗故曰阿是穴阿是之名出於唐之代漢書東方朔傳師古注曰今人痛甚則稱阿雲云師古唐人蓋當時有此聲阿是乃按而痛甚之處為是之意也又靈樞經筋篇曰以痛為輸之類也又素問王注曰不求穴俞而直取居邪之處此類皆阿是也又千金方曰阿是穴玉龍賦歌謂不定穴但痛處就於左右穴經所謂以痛為輸是也又針方六集曰不定穴但隨痛處用針即天應穴又醫學綱目曰渾身疼疼但於痛處針不拘經穴須避筋骨穴名天應穴又醫經會元曰穴但痛處針名天應穴人有四關出於九針十二原篇合谷大沖是曰四關馬氏曰四關者即手肘足膝之所關節之所繫也人有四海醫學原始曰海有東西南北人亦有四海以應之胃者水穀之海衝脈者十二經之海膻中者氣之海腦者髓之海是也反關脈吳昆方考脈語曰反關脈者脈不行於寸口由列缺絡入臂後手陽明大腸經也以其不順行於關上故名曰反關有一手反關者有兩手反關者此得於有生之初已然非為病也診法皆同若病人平日正取有脈一旦因得病伏匿者此病脈種種不同必原其證而治之古今醫統曰人或有寸關尺三部脈不見自列缺至陽溪見者俗謂反關脈此經脈虛而絡脈滿神門脈李士材診家正眼曰兩手尺中乃神門脈也王叔和曰神門訣齗兩在關後人無二脈病死不救詳考其論腎之虛實俱於尺中神門以後驗之蓋水為天一之元萬物賴以資始也故神門脈絶即是腎絶先天之根本既無回生之日也而脈微謂為心脈者誤矣彼因心經有穴名曰神門正在掌後兌骨之端故錯認耳殊不知心在上焦豈有候於尺中之理乎三經脈類經注曰經脈十二而三經獨多動脈而三經之脈則手太陰之大淵足少陰之太溪足陽明上則人迎下則衝陽皆動尤甚者也診家正眼曰衝陽者胃脘也一曰趺陽在足面大指間五寸骨間動脈是也凡勢危篤當候衝陽以驗其胃氣之有無蓋土為萬物之母資生之本也故經曰衝陽絶死不治又曰太溪者腎脈也在足內踝後跟骨上陷中動脈是也凡病勢危篤當候太溪以驗其腎氣之有無蓋水為天一之元資始之本也故經曰太溪絶死不治十二經動脈人鏡經曰十二經動脈或時動時止而不常惟手太陰為五藏之主足陽明為六府之原足少陰起於衝脈為十二經之海故常動不休手太陰肺經動脈大淵手陽明大腸經動脈陽溪足陽明腎經動脈衝陽足太陰脾經動脈衝門手少陰心經動脈陰郤手太陽小腸經動脈天窗足太陽膀胱經動脈委中足少陰腎經動脈太溪手厥陰心包經動脈勞宮手少陽三焦經動脈和髎足少陽膽經動脈懸鐘足厥陰肝經動脈太衝頭上諸脈出於吳醫匯講蓋聞手之三陰從臟走手手太陰肺少陰心厥陰心包手三陽從手走頭手少陽三焦陽明大腸太陽小腸足之三陽從頭走足足太陽膀胱陽明胃少陽膽足之三陰從足走腹足太陰脾少陰腎厥陰肝靈已遂一而分言茲乃合端而便讀膀胱之脈交於巔肝與督脈會於巔絡腦須知膀督惟欲便於讀故用簡字訣余仿之髮際循乎胃脈胃至額顱髮際下為額顱膽抵頭角上額者督與膀胱在內直上出額者其惟肝經在外直出目系連於肝脈心之支者並繫於目之內角名目內眥小支至而膀胱起胃經還約於旁小腸之支者至目內眥膀胱之脈起於目內眥胃脈起於鼻之交頞中旁約太陽之脈下循鼻外目之外角名曰鋭眥膽接焦支三焦之支者至鋭眥膽脈起於目鋭眥小腸亦至目下為䪼焦膽小腸而合至三焦俱支者兩旁為頰大小膽焦而上下夾而橫骨為頰大腸貫頰小腸之上頰肝與三焦俱下頰四肢亦俱攴者小腸之支斜絡於顴督脈至於鼻柱胃脈起於交頞即山根大腸之支挾鼻孔而交中挾口從下齒還出挾口交人中左之右右之左上挾鼻孔至迎香穴而終交足陽明經胃經之脈循鼻外而挾口環唇肝又環於唇內胃又交承漿下層陷中胃經之脈入上齒大腸之支入下齒頷前大迎胃脈出而膽支下腮下為頷頷前一寸三分動脈陷中為大迎乃胃經穴頷下為頤胃脈循而任脈上胃經循頤後下廉耳之上角焦支出而膽支至客主人穴膽出走而胃脈過耳前上廉起骨曰客主人乃膽經穴膽脈之支者出走耳前至目鋭眥後胃脈上耳前過客主人三焦之孫脈靈樞曰經脈為里支而橫者為經絡之別者為孫此支之岐者故曰系脈後仿之出走客主人前小腸與焦膽三支並人耳中膽脈焦支系於耳後膽支胃脈循在頰車耳下曲骨為頰車咽有小心脾腎之脈小腸脈循心脈之支者挾咽脾脈挾咽腎脈至咽喉為胃支腎脈之循二脈循喉嚨肝循喉後而入咽顙肝脈循喉嚨之後上入咽顙咽顙名頏顙在上齶後脾連舌本而散舌下腎脈挾乎舌本胃支下在人迎結喉旁一寸五分動脈此為諸陽之會先須大略而陳在身諸脈原夫腦後為項膀胱督脈與焦支兩旁為頸大小腸支同膽脈肩髃之前廉大腸出之肩後之下為膊膀胱循也焦膽小腸交合於肩會於大椎者為肩腎經督脈並貫於脊脊骨兩旁第一行相去各一寸五分挾脊肉為膂膽脈循之而挾脊脊骨兩旁第二行相去各三寸成片骨為胛音夾小腸繞而膀支貫至於肩前陷下名曰缺盆焦膽胃腸併入其中是以膽脈循胸三焦布膻上焦而乳中間為膻中乳內廉乃胃經直下腋之中分膽經包絡心包絡亦有直者支者之分恐辭句繁復故此處支者僅云心包下文正脈乃用心包二字以別文腋下為包絡之過心直下而肺橫出脅裡為膽脈循心包出而肝經布脅骨之下為季脅須識膽經之過臍下四寸為中極當知任脈之起任脈起於中極之下然而任脈當臍沖胃挾臍脾脈入腹胃支循腹肝經上抵乎小腹膽胃出入於氣街臍下毛際兩旁動脈為氣街一名氣衝乃胃經穴膽繞毛際曲骨之外為毛際肝環陰器此在身軀之脈所當臚列而明臟腑中諸脈其在臟腑之脈太陽與少陰為表裡手太陽小腸少陰心足太陽膀胱少陰腎少陽與厥陰為表裡手少陽三焦厥陰心包足少陽膽厥陰肝陽明與太陰為表裡手陽明大腸太陰肺足陽明胃少陰腎凡此六經脈皆互絡手足同然無煩詳贅如肺脈絡大腸大腸脈絡肺之類十二經皆仿之更有肺之一臟心直上而腎直入胃之一腑肝脈挾而肺小循肝脈挾胃肺脈還循胃口小腸之脈抵胃心有腎支之絡肝有腎經之貫脾支又注於心中肺脈自起於中焦心下有膈惟膀胱為無涉十有一經皆上下而貫之心下膈膜遮隔濁氣不使上薰心肺惟膀胱之脈挾脊抵腰中入循膂絡腎屬膀胱故不貫膈此臟腑之間並須熟諳者手經諸脈論乎肩肘之間乃號為臑音柔俗名大骨臑之內廉有三肺循前而心循後包絡恰循乎其間臑之外廉有三小循後而大循前三焦乃循乎其外臑下為肘三焦上貫內廉尸澤包絡入之包絡之支者入肘內陷中尺澤穴肺則下於內前心又下於內後肺脈下肘中心脈下肘內惟肺脈行前心脈行後心包行其中間為別小腸出於內側兩筋之間大腸入於外廉肘下為臂包仍在中即上文支者大循上而小循下心脈仍循內後廉上骨下廉之內仍循肺脈臂外兩骨之間還出三焦肺入寸口而循魚際關前動脈為寸口大指後肉隆起處為魚際其間穴名心抵鋭骨而入後廉心脈掌後鋭骨之端入掌內後廉胞絡直入於掌中從曲澤行掌後兩筋之間橫紋中陷中入掌中三焦仍循乎表腕大腸出於合谷而上入兩筋之中合谷俗名虎口大腸經穴小腸循於外側而出腕下之踝循手外側上腕出踝中踝音華上聲腕外兌骨肺脈出於大指包絡出於中指次指為肺支腸脈之交肺脈之支者直出次指內廉出其端大腸之脈起於次指之端四指為包孫焦脈之接三焦又上出小次之間小指為心脈小腸之接所謂手經大略如前足經諸脈至如尻上為腰膀胱脈抵背脊下橫骨為腰腰下為臀膀支貫之而旁捷骨之下名髀樞而膽橫膀過一名髀厭膽脈橫入髀厭中膀胱之支者過髀樞前面氣街之下號髀關而胃經直下股之內廉前廉脾而後廉腎又肝脈內循於股陰股外為髀後膀支而前胃脈髀前膝上六寸起肉為伏兔胃脈抵之又膽脈下循於髀陽循髀外太陽陽明之間是以挾膝筋中為臏即膝蓋骨仍屬胃經之直下而膝內脾經內前廉膝後曲處為膕還是膀支之直入而腎出肝上俱在內廉腎脈出膕內廉肝脈上膕內廉腎脾上於腨內腨足肚也二脈上腨內廉膀支貫於腨外從膕中下貫腨內出外踝之後膽下於外輔骨前而直抵絶骨之端髀骨為輔骨外踝上為絶骨肝斜於膽胻內側而胃循脛外之廉內踝有脾前腎後之分外踝有膽前膀後之別踝上兩旁內外曰踝大指節後為核骨脾經脈過足外側骨為京骨膀脈支循腎入跟中胃膽循跗跗上廉乃肝經循處足心中有腎脈斜過湧泉穴大指甲後屬膽支肝脈之交大指內側為胃支脾脈之接中指內外分胃直胃支之人四指之間又膽經直入而絡膽支至於小指之外腎脈起於小指之下足經之脈又如此也
