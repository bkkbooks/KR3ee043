body:
  text: 卷五周身名位骨囟金鑑曰顛前之頭骨嬰兒腦骨未合軟而跳動之處曰囟門人鏡經曰頂𩕳前為囟無冤録曰囟門在百會之前髮際金鑑曰囟前為髮際額囟金鑑曰額前髮際之下無冤録曰首骨也在囟門之下經穴指掌圖書曰顱下曰額額郭也即天庭也無冤録曰額角在頭顱左右顏釋骨曰額之中曰顏曰庭六書故曰自頞達兮顙為顏靈樞五色篇曰明堂者鼻也闕者眉間也庭者顏也又云庭首面也釋骨自庭至下極皆顏説文曰眉目之間闕釋骨曰眉間曰闕下極釋骨曰闕之下曰下極頞金鑑曰鼻梁即山根也鼻亦下極經絡全書鼻山根也俗呼為鼻梁鼻柱金鑑曰兩孔之界骨名曰鼻柱下至鼻之盡處名曰準頭釋骨曰鼻骨曰鼻柱曰明堂骨鼻孔人鏡經曰人中上兩旁為鼻孔人中金鑑曰鼻柱下唇上名水溝唇人鏡經曰口沿為唇齒人鏡經曰口內前小者為齒小兒方訣曰自腦分入齦中作三十二齒而齒牙有不及三十二數者變不足其常也或二十八日即至長二十八齒已下仿之但不過三十二數牙圖翼曰前小者曰齒後大者曰牙人鏡經曰齒旁大者為牙齗人鏡經曰根肉為齗經絡全書曰齒根肉也亦作齦舌人鏡經曰齒內為舌舌本金鑑曰舌本者舌根也懸癰醫彀曰舌本上為懸癰承漿人鏡經曰地閣上陷為承漿地閣金鑑曰即兩牙車相交之骨又名頦俗名下巴骨經絡全書曰頦一名地閣結喉金鑑曰喉之管藏府指掌圖書曰十二節上三節微小下九節微大第四節乃結喉也額角人鏡經曰額顱前兩旁為額角頭骨金鑑曰額兩旁稜處之骨也鬢骨經穴指掌圖曰耳前動處一名鬢骨即顳顬一名鬢骨俗曰兩太陽曲隅人鏡經曰額角兩旁耳上髮際為曲隅釋骨曰形曲故曰曲角目金鑑曰目者司視之竅也口問篇曰心者五藏六府之主也目者宗脈之所聚也目眶經絡全書曰瞼也俗呼為眼胞目綱金鑑曰綱者上下目胞之兩瞼邊又名曰睫司目之開闔也目胞金鑑曰目胞者一名目窠一名目裹即上下兩目外衛之胞也無冤録曰眼之裹胞也俗呼眼蓋也目珠金鑑曰目睛之俗名也目系金鑑曰目睛入腦之系也人鏡經曰目內連深處為系宮骨聖濟總録曰左睛之上為宮骨命門骨聖濟總録曰右睛之上為命門骨內眥醫彀曰內眥者為睛明外眥醫彀曰外眥者為鋭骨金鑑曰內眥乃近鼻之內眼角以其大而圓故又名大眥外眥目外者近鬢前之眼角也以其小而尖故稱目鋭眥䪼釋骨曰目下曰䪼經穴指掌圖書曰面秀骨經絡全書曰䪼者頄也俗呼顴䪼面頄骨釋骨曰䪼下旁而大者曰面頄骨亦顴骨亦曰頄關釋骨曰耳前曰關兌發人鏡經耳前髮腳為兌發蔽金鑑曰耳門也耳郭金鑑曰耳輪也頰金鑑曰耳前顴側面旁之稱經絡全書曰面旁也在耳下亦名蕃車無冤録曰腮頰面旁大迎骨釋骨曰曲骨前齦而若逆顑金鑑曰顑者俗呼為腮口旁頰前肉之空軟虛頷金鑑曰頦下結喉上兩側肉之軟處無冤録曰頷頦在頤下頤金鑑曰口角後顑下鄭玄曰頤者口車之名也吻金鑑曰口之四周也金鑑曰凡前曰面凡後曰背居頭之前故曰面頂𩕳人鏡經曰巔前為頂𩕳巔金鑑曰頭頂也巔頂骨也俗名天靈蓋腦金鑑曰腦者頭骨髓也俗名腦子枕骨釋骨曰巔之後橫起者曰頭橫骨曰枕骨金鑑曰後山骨即枕骨也玉枕骨釋骨曰枕骨之兩旁最起者曰玉枕骨完骨釋骨曰玉枕骨下高以長在耳後曰完骨金鑑曰壽臺骨即完骨在耳後接於耳之玉樓骨者也柱骨釋骨曰三節植頸項者通曰柱骨頸金鑑曰頸之莖也又曰頸者莖之側也又曰頭之莖骨肩骨上際之骨俗名天柱骨項金鑑曰頸後莖骨之上三節圓骨也雞足青金鑑曰耳本脈中為雞足青耳上角釋骨曰耳之後上起者巨骨釋骨曰肩端前橫而大圖翼曰膺上橫骨缺盆經穴指掌圖曰結喉下巨骨上缺陷處若盆也䯏骨釋骨曰乃缺盆骨兩旁之端則肩端骨玉篇曰骨端也胸金鑑曰缺盆下腹上有骨之處圖翼曰兩乳之間膺金鑑曰胸前兩旁高處也乳金鑑曰膺上突肉有頭𩩲骬釋骨曰蔽心者曰𩩲骬曰鳩尾曰心蔽骨曰臆前蔽骨腹金鑑曰胸下圖翼曰臍上下皆曰腹臍金鑑曰人之初生胞帶之處也少腹金鑑曰臍下曰少腹亦小腹太平御覽曰有小腹之別臍下曰小腹臍下旁曰少腹保命歌括曰臍以下曰水腹水汋所聚也又曰少腹少小也比於臍上為小也毛際金鑑曰小腹下橫骨間叢毛之際也橫骨釋骨曰𩩲骬直下橫兩股間者曰橫骨曰股際骨經穴指掌圖曰陰毛中有陷如偃月曲骨釋骨曰橫骨中央兩垂而厭陰器者篡金鑑曰橫骨下兩股之前相合共結之凹也前後兩陰之間名下極穴又屏翳穴會陰穴即男女陰氣之所也人鏡經曰篡內深處為下極穴陰廷人鏡經曰下極之前男為陰廷女為窈漏陰廷下為陰器廷孔類經曰女人溺孔在前陰中橫骨之下男子溺孔亦橫骨之下中央為宗筋所函不見耳馬注曰廷孔也其孔即溺孔之端蓋窈漏之中有溺孔其端正在陰廷乃溺孔之端也睪丸金鑑曰男子前陰兩丸也莖張氏曰陰器者合太陽厥陰陽明少陰之筋及衝任督之脈皆聚於此故曰宗筋厥陰屬肝肝主筋故絡諸筋而一之以成健運之用説郛曰陰莖屬足厥陰肝經陰囊屬足厥陰肝經睪丸屬足厥陰肝經陰中即陰戶之口屬足厥陰肝經陰戶即陰門之口屬足厥陰肝經背釋骨曰項大椎之下二十一節通曰脊骨曰脊椎曰膂骨曰中呂第一節曰脊大椎形如杼故亦曰杼骨第十三節至十六節曰高骨曰大骨其以上七節曰背骨則第八節以下乃曰膂骨末節曰尻骨曰骶骨曰脊骶曰尾骶亦曰骶曰尾屈曰橛骨曰窮骨生氣通天論王注曰高骨謂腰之高骨是高骨通謂腰間脊骨之高者沈彤按上七節皆背骨而膂骨自八節以下明矣又説文訓呂為脊骨訓背為脊而訓脊則兼背呂亦一脊而分上背下呂之證又氣穴論云中呂兩旁各五穴注謂起肺俞至腎俞肺俞在第三椎下兩旁腎俞在十四椎下兩旁是中呂云者謂第三椎至十四椎為膂之中也此又以膂骨五骨通稱為呂也六書精蘊曰𫈨力莒切脊骨也凡二十一部如珠氣行一起一伏也象上下相貫形凡藏府皆繫於𫈨心系於五椎自十七至二十為腰監骨所弇心之前有蔽骨天然之妙也或從肉作膂脊之重在骨不在肉也借為律呂之呂萬病回春曰背倍也在後稱也又曰脊積也種續骨節終上下人鏡經曰脊骨節為顀顀骨下盡處為顀尾顀尾鋭為尾蛆骨一名骶骨又曰脊骨除項骨三節二十一盡處為尾蛆骨扁骨人鏡經曰骶骨兩旁為扁骨尻人鏡經曰八髎盡分各處為尻金鑑曰尻骨者腰骨下十七椎十八椎十九椎二十椎二十一椎五節之骨也上四節紋之旁左右各四孔骨形凹如尾長四五寸許上寬下窄末節更小如人參蘆形名尾閭一名骶端一名橛骨一名窮骨肛門後其骨上外兩旁形如馬蹄附著兩骨上端俗胯骨腰骨金鑑曰脊骨十四椎下十五十六椎間尻上之骨也其形中凹上寬下窄方丹二三寸許兩旁四孔下接尻骨上際醫彀曰藍骨上為腰骨一名䯠髂醫彀曰䯠上為髂腰踝圖翼曰腰髀即腰胯骨也自十六椎而下伏脊附著之處也腰藍骨醫彀曰尻上橫者為腰藍骨臀金鑑曰尻旁之大肉也人鏡經曰臀肉為脽醫經原旨曰凡形充而臀削者必非福壽之兆胂金鑑曰腰下兩旁髀骨上之肉也三柱骨醫彀曰肩胛際會處為三柱骨䯋醫彀曰三柱之上兩旁之前為䯋肩胛醫彀曰肩解下成片者為肩胛一名膊肩解金鑑曰肩端之骨節解處也小髃釋骨曰肩前微起者髃骨釋骨曰缺盆骨兩旁之端肩端骨醫彀曰肩兩端骨間為髃骨𦟘醫彀曰凡二十一節通項骨三節共二十四節脊肉為𦟘膂醫彀曰𦟘兩旁為膂胛又曰膂肉為胛一名脢經典釋文脢武杯反又音每心之上口之下也鄭玄曰背脊肉也説文脢背肉也腋釋骨曰肩之下脅之上際圖翼曰腋下亦曰胳玉篇曰胳腋下也胠説文胠腋下也圖翼曰腋下脅上金鑑曰胠統脅肋之總名曰胠釋骨曰乳三寸者曰胠胠骨五左曰左胠右曰右胠其抱胸過乳而兩端相直者曰膺中骨脅釋骨曰膺中骨之下及胠外者曰脅骨曰脅肋胠及膺中骨之在乳下者通曰脅至真要大論注曰脅謂兩乳之下及胠外也橛肋釋骨曰脅骨之短而在下者曰橛肋三季肋釋骨曰橛肋最短俠脊者曰季肋其橛肋之第三條曰季脅脅攴釋骨曰凡脅骨之端通曰脅支亦曰攴骹張志聰曰胸脅交分之扁骨內膈前連於胸之鳩尾旁連於脅後連於脊之十一椎釋骨曰脅支之端相交者曰骹䏚玉機真藏論曰季脅之下俠脊兩旁空軟處也金鑑曰脅下無肋骨空軟處也楗骨空論王注曰髀輔骨上橫骨下股外之中側立搖動取之筋動應手經絡全書曰在髀輔骨上腰橫骨下股外之中側立搖動取之筋動應手是也髀樞圖翼曰楗骨下髀之上曰髀樞當環跳穴膝釋名曰膝伸也可屈伸金鑑曰股中節上下交接處膝解金鑑曰膝之節解也人鏡經曰髀關下膝解為骸關骨空論曰膝解為骸關注曰膝外為骸關集注膝後分解之處臏骨説文膝端也釋骨曰蓋骨也膝蓋之骨曰膝臏經絡全書曰膝蓋骨也又名連骸骨又釋骨曰輔骨旁不曰輔曰連骸骸上者𩩋之上端也説文曰骸脛骨圖翼曰膝下內外側大骨䯣説文膝脛間骨也人鏡經曰臏下通為䯣輔骨人鏡經曰䯣外為後輔骨釋骨曰俠膝之骨曰輔骨內曰內輔外曰外輔䯒釋骨曰在膝以下者曰䯒骨䯒亦作胻䯒者小股也亦曰足𩩋脛與𩩋同曰骸曰骭類經曰骭足𩩋骨骸説文曰脛骨又曰骭骹骨經絡全書曰脛骨之近足而細於股內者亦名之為骭骨成骨釋骨曰䯒外廉起骨成䯒者曰成骨剌腰痛論注曰調膝外近下䯒骨上端兩起骨相併間陷容指者也䯒骨所成柱膝髀骨故謂之成骨踝釋骨曰䯒下端起骨曰踝內曰內踝外曰外踝腕人鏡經曰脛下盡處為曲節一名脘跗圖翼曰足面也人鏡經曰岐骨上為跗岐骨人鏡經曰本節後為岐骨本節人鏡經曰聚毛後為本節京骨釋骨曰足外側大骨曰京骨束骨釋骨曰小指本節後曰束骨附屬釋骨曰外側近踝者曰附屬類經曰足面前後皆跗之屬跟釋骨曰兩踝後在踵者曰跟骨圖翼曰足根也回春曰足後曰跟人鏡經曰足掌後為跟三毛人鏡經曰大指爪甲之後為三毛聚毛人鏡經曰三毛後橫紋為聚毛股人鏡經曰髀樞下股一名胯股骨為䯑䯖説文曰胯股也金鑑曰下身兩攴通稱也俗名大腿小腿魚腹股人鏡經曰股下為魚腹股髀人鏡經曰魚腹股外為髀關髀關人鏡經曰伏兔後交文中為髀關伏兔人鏡經曰髀之前膝上起肉為伏兔膕人鏡經曰膝後曲處為膕金鑑曰膝屈俗名腿凹也腨説文曰腓腸也至真要大論王注曰䯒後軟肉處也金鑑曰鏡者下腿肚也一名腓腸俗名小腿肚然骨釋骨曰內踝下前起大骨核釋骨曰跗內下為核骨一名核骨圖翼曰足大指本節後內側丹骨醫學綱目曰本節後約二寸內踝前約三寸如棗核橫於足內踝赤白肉際者是也趾金鑑曰其數五名為趾者別於手也跖人鏡經曰大指下為跖跽人鏡經曰跖下為跽板人鏡經曰跽後為板蹄釋名曰蹄底也足底也回春曰蹄底也乃足之底足心人鏡經曰板後為足心足掌人鏡經曰足心後為足掌踵釋名曰踵鍾也鍾聚也上體之所鍾聚也金鑑曰足下面著於地之謂也俗名腳底板膊人鏡經曰從肩解後之下為膊臑人鏡經曰膊下對腋為臑金鑑曰肩髆下內側對腋處高起耎白肉也臂圖翼曰肘之上下皆名臂一曰自曲池以下為臂金鑑曰一名肱俗名胳膊説文曰臂手上也人鏡經曰臑下為股一名臂腕人鏡經曰臂骨盡處為脘金鑑曰臂掌骨接交處以其宛居故名也當外側