body:
  text: 卷三足少陽膽經入門曰子時自耳門交與目眥瞳子窌循頭耳側脅下行至足小指竅陰穴止瞳子髎目外眥五分醫學原始曰在眉梢頭尖下盡處聽會大成曰在耳微前陷中明下經曰在耳微前陷者中張口有穴圖翼曰去耳珠下開口有空側臥張口取之客主人耳前起骨上廉開口有空動脈宛宛中頷厭入門曰對耳額角外懸顱入門曰斜上額角中在懸釐間懸釐入門曰從額斜上頭角下陷營昇按此三穴諸書未言寸法欲求其穴則先定胃經頭維穴與曲賓穴而後得之即以一繩當頭維穴曲賓穴截斷之復以其繩四折之第一折處是頷厭第二折處是懸顱第三折處是懸釐曲賓入門原始俱曰耳上入髮際曲隅陷中鼓頷有空以耳掩前尖處是穴經穴指掌圖孔穴歌曰掩耳正尖上率谷原始曰在耳尖上入髮際一寸五分銀海精微曰將耳摺轉尖上比寸半盡處是率谷穴天衝銅人經耳後入髮際二寸浮白耳後入髮際一寸竅陰完骨上枕骨下搖動有空營昇按天衝浮白竅陰三穴雖有分寸難得而取故欲求其穴則先以一繩當率谷穴向後斜行至完骨中央截斷再以其繩為四折求三穴率谷後第一折入髮際二寸是天衝穴也天衝後第二折入髮際一寸是浮白穴也浮白後第三折是完骨上完骨謂耳後之高骨也枕骨謂腦後之橫骨也骨空論頭橫骨為枕者是也言搖動有空非謂俯仰鼓頷完骨邊所動搖之謂也完骨耳後入髮際四分本神原始曰神庭各開三寸曲差旁一寸五分陽白眉上一寸直瞳子臨泣醫統曰目上直入髮際五分陷中令患人正睛取穴營昇按本神與曲差之中間神庭旁二寸二分五釐為是目窗臨泣後一寸正榮目窗後一寸承靈正榮後一寸五分腦空承靈後一寸五分風池十四經合參曰在腦空後髮際陷中營昇按三焦經天牖與膀胱經天柱之中間是穴也肩井肩上陷中缺盆上大骨前一寸半以三指按取之當中指下陷中者是神照集曰取法肩上陷是缺盆其上一寸半是柱骨如取左穴用本人右手小指按於左肩柱骨尖上平排三指取中指下第一節中是穴取右穴亦如是原始曰以手小指頭節按於巨骨上取中指第二節橫紋是穴兼羅集曰此穴五臟真氣所聚淵液液下三寸宛宛中舉臂取之輒筋入門曰淵液前一寸日月期門下五分京門圖冀曰在臍上五分傍九寸半季肋本俠脊側臥屈上足伸下足舉臂取之帶脈注證曰章門下一寸八分圖翼曰在季脅下一寸八分陷中一云臍旁八寸半肥人九寸瘦人八寸如帶繞身管束諸經大成曰季肋下一寸八分臍上二分兩旁各七寸半五樞帶脈下三寸經脈篇馬注曰去帶脈三寸季脅下四寸八分營昇按聖濟總錄聖惠方甲乙經外臺千金方銅人經醫統資生聚英帶脈下三寸水道傍一寸五分是維道章門下五寸三分甲乙經聖濟總錄千金方外臺聚英資生經醫統銅人經六集入門金鑑章門下五寸三分居髎氣府論王注曰在章門下四寸三分骼骨上原始神照集環跳上一寸環跳神照集曰在髀樞中側臥屈上足伸下足以左手按穴右手搖撼取之穴在陷中風市神照集曰在膝上七寸股外側兩筋間垂手中指點到處是穴神農皇帝針灸圖資生經大全入門大成金鑑經穴指掌圖原始共屬於膽經部分據而補焉中瀆神照集曰在髀骨外膝上五寸分肉間陷中陽關徐氏大全入門等陽陵泉上二寸營昇按此穴屈膝於橫文之尖點墨而後伸足其點是穴用此法則大率當陽陵泉上二寸陽陵泉原始曰在膝品骨下一寸外廉輔骨陷中營昇按與足太陰經陰陵泉相對伸足取之陽交原始曰在外踝斜七寸一云與外丘並斜向三陽分肉間營昇按三陽異本三作二二陽足陽明胃經足太陽膀胱經也胃經行前出於大指次指端厲兌穴膀胱經行後出於小指外側端至陰穴此膽經行前後兩經分肉之間出於小指次指端竅陰穴外丘神照集曰足外踝上七寸與陽交平差後一寸光明足外踝上五寸陽輔入門曰外踝上四寸附骨前絕骨端一名絕骨本義曰絕骨一名陽輔一名絕骨剌瘧論王注陽輔一名絕骨懸鐘足外踝上三寸動脈中一名絕骨千金方原始聚英營昇按甲乙經曰足外踝上三寸動者中足三陽絡按之陽明脈絕乃取之又千金方曰懸鐘一名絕骨在外踝上三寸動者中足三陽絡又針灸聚英曰懸鐘一名絕骨足外踝上三寸動脈中千金方聚英原始皆懸鐘一名絕骨又刺瘧論王注陽輔一名絕骨又難經本義絕骨一名陽輔十四經發揮滑氏注外踝以上為絕骨竇漢卿外踝上為絕骨是以骨位言也非言穴名也又千金翼曰在足外踝上三指當骨上取法以草從手指中文橫三指令至兩畔齊將度外踝從下骨頭與度齊向上當骨點之又千金方灸腳氣絕骨者以一夫取之是即腳氣八處灸法之絕骨也世醫專治腳氣或中風或水腫或膝脛痠麻疼痛皆灸絕骨予常考索懸鐘之主治聖濟總錄銅人經膝䯒筋瘛足不收履坐不能起又聖惠方心腹脹滿膝脛連腰痛筋攣急腿胯膝脛痹麻屈伸難針方六集腳氣心腹脹滿水腫百節痛左癱右瘓兩足不隨又聚英腳氣膝䯒痛筋骨攣痛足不收中風手足不隨又入門濕痹流腫筋急瘛瘲又醫學原始腳氣紅腫起坐艱難因是觀之懸鐘穴為絕骨可知也丘墟大成曰在足外踝下從前陷中骨縫中去臨泣三寸又俠谿穴中量上外踝骨前五寸臨泣神照集曰在足小指次指本節外側後筋骨縫陷者去俠谿穴一寸五分地五會足小指次指本節後陷中銅人經資生經聚英原始大全足小指次指本節後陷中去俠谿一寸俠谿足小指次指岐骨間本節前陷中竅陰大成曰在足小指次指端外側去爪甲角滑氏此經頭部自瞳子髎至風池凡二十穴作三折自瞳子髎至完骨是一折又自完骨外折上至陽白會晴明是一折又自晴明上行循臨泣風池是一折足少陽經接自手少陽之絲竹空而起於目外去眥五分之瞳子髎循耳前陷中客主人下一寸為聽會耳前起骨上廉開口有空為客主人耳前曲角顳顬上廉為頷厭耳前曲角上顳顬之中為懸顱顳顬下廉為懸釐耳上入髮際曲隅陷中為曲髩耳上入髮際一寸半陷中為率谷耳後入髮際二寸為天衝入髮際一寸為浮白在完骨上枕骨下搖動有空為竅陰耳後入髮際四分為完骨曲差旁一寸五分為本神眉上一寸直瞳子為陽白目上直入髮際五分陷中正睛取之為臨泣臨泣後一寸為目窗目窗後一寸為正營正營後一寸五分為承靈承靈後一寸五分為腦空耳後顳顬後腦空下發際陷中為風池足外踝上七寸斜屬三陽分肉間為陽交外踝上七寸為外邱外踝上五寸為光明外踝上除骨四寸為陽輔踝上三寸當骨尖前動脈中為懸鐘外踝下陷中為邱墟小指次指本節後間陷中去俠谿一寸半為臨泣本節後去俠谿一寸為地五會本節後歧骨間陷中為俠谿小指次指端去爪甲如韭葉為竅陰肩上陷解中缺盆上大骨前一寸半為肩井腋下三寸為淵腋復前行一寸著脅為輒筋期門下五分為日月監骨腰中季脅為京門季脅下一寸八分陷中為帶脈帶脈下三寸為五樞五樞下五分為維道章門下四寸三分為居髎髀樞中側臥伸下足屈上足取之為環跳髀骨外膝上五寸分肉間為中瀆陽陵泉上三寸為陽關膝上一寸外廉為陽陵泉滑氏曰足少陽經起目銳眥之瞳子髎於是循聽會客主人上抵頭角循頷厭下懸顱懸釐由懸釐外循耳上髮際至曲賓率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折上通角孫循本神過曲差下至陽白會晴明復從晴明上行循臨泣目窗正營承靈腦空風池云自風池循頸過天牖穴行手少陽脈之前下至肩上循肩井卻左右相交出手少陽之後過大椎大杼秉風當秉風前入缺盆之外其支者別自目外瞳子髎而下大迎合手少陽於䪼當顴髎穴之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也自屬膽處循脅內章門之裡出氣沖繞毛際遂橫入髀厭中之環跳也直者從缺盆直下腋循胸歷淵腋輒筋日月穴過季脅循京門帶脈五樞維道居髎由居髎入上髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉也自陽陵泉下外輔骨前歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣地五會俠谿乃入小指次指之間至竅陰而終也支者自足跗上歸泣穴別行入大指循岐骨內出大指端還貫入爪甲出三毛交於足厥陰也足厥陰肝經入門曰丑時自竅陰交與足大指端大敦循膝股上行至腹期門穴止寅時復行於肺經也至真要大論曰帝曰厥陰何也岐伯曰兩陰交盡也類注曰厥盡也兩陰交盡陰之極也大敦足大指去爪甲如韭葉及三毛中醫統聚英針灸六要內側為隱白外側為大敦行間入門神照集原始共足大指次指岐骨間動脈陷中太衝圖翼曰足大指本節後行間上二寸至真要大論曰太衝絕死不治又云診病人太衝脈有無可以訣死生中封大成曰足內踝骨前一寸筋里宛宛中蠡溝內踝上五寸中都大成曰內踝上七寸胻骨中與少陰相直膝關神照集曰在膝蓋骨下內側陷中與犢鼻平相去二寸大成曰犢鼻下二寸旁陷中營昇按此所稱犢鼻非指穴而言指犢鼻骨曲泉大成曰膝股上內側輔骨下大筋上小筋下陷中屈膝橫紋頭取之陰包膝上四寸股內廉兩筋間五里氣衝下三寸陰股中動脈陰廉神照集曰在羊矢下羊矢者膚中有核如羊矢也去氣衝二寸動脈中急脈氣府輪曰厥陰毛中急脈各一王注曰有陰毛中陰上兩旁相去同身寸之二寸半圖翼曰按此穴自甲乙經以下諸書皆無是遺誤也經脈篇曰足厥陰循股陰入毛中過陰器又曰其別者循脛上睪結於莖然此實厥陰之正脈而會於陽明者也章門圖翼曰肘盡處是穴一云在臍上一寸八分兩旁各八寸半營昇按醫彀曰章門臍上二寸量橫取八寸看兩傍針灸經驗方臍上二寸兩旁八寸神照集曰在大橫外直季脅端肘盡處是穴俠下脘兩旁九寸分寸歌章門下脘兩旁九寸肘尖盡處側臥取聚英大橫外直季肋端臍上二寸兩旁九寸入門臍上二寸橫取六寸側脅季肋端神應經臍上二寸兩旁各六寸金鑑大橫穴外季肋直臍軟骨端臍上二寸兩旁開六寸側臥取肘尖盡處原始臍上二寸橫取六寸側脅季肋端聖惠方大橫外直臍季肋端是穴必須側臥伸下腳縮上腳乃得穴也甲乙經大橫外直臍季脅端銅人經大橫外季肋端十四經合參季脅端臍上三寸兩旁開九寸側臥肘尖盡處諸說多端不一定矣要之因人有肥瘦不能無少異同姑以圖翼所說臍上一寸八分兩旁八寸半肘尖盡處為是期門分寸歌在巨闕旁四寸五分無差矣足厥陰經接自足少陽竅陰而起於足大指端去爪甲韭葉之大敦循大指間動脈應手陷中為行間大指本節後二寸為大沖足內踝前一寸筋里宛宛中為中封踝上五寸為蠡溝踝上七寸為中都犢鼻下二寸旁陷者中為膝關膝內輔骨下大筋上小筋下陷中為曲泉膝上四寸股內廉兩筋間為陰包氣衝下三寸陰股中動脈為五里羊矢下斜里三分直上去氣衝二寸為陰廉急脈穴在陰毛中陰上兩旁相去二寸半按之隱指堅然實厥陰之正脈諸書不載因補之其在大橫外直臍季脅端為章門在不容旁一寸五分上直乳第二肋端為期門滑氏曰足厥陰起於大指聚毛之大敦穴循足跗上廉歷行間大沖抵內踝一寸之中封也自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉由曲泉上行循股內之陰包五里陰廉遂當衝門府舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元復循章門至期門之處挾胃屬肝下日月之分終於膽也自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵液之間人迎之外循喉嚨之後上入頏顙行大迎地倉四白陽白之外連目繫上出額行臨泣之裡與督脈相合於巔頂之百會也支者從目系下行任脈之本經之裡下頰裡交環於口唇之內支從期門屬肝處別貫膈行食竇之外本經之裡上注肺中下行至中焦挾中脘之分以交於手太陰也督脈身強脊骶端刺熱篇王注曰脊節之謂椎脊窮之謂骶古今醫統曰尾閭穴督脈下行盡處是穴經絡全書東垣曰督脈出於會陰根於長強則為兩穴明矣腰俞第二十一椎節下間陽關第十六椎節下間營昇按甲乙經千金方外臺無此穴自十二椎至十七椎凡四椎為腰監骨所揜附故無穴命門第十四椎節下間圖翼曰平臍用線牽而取之千金方曰腰痛不得動者令病人正立以竹杖拄地度至臍乃取杖度背脊灸杖頭盡處營昇按肥人腹垂則臍低瘦人腹凹則臍昂今不論肥瘦用線而取之以杖而度之則未有準也懸樞第十三椎節下間營昇按明堂上經作十二椎節間又下經作十一椎下脊中穴既在十一椎下不應懸樞又在十一椎下固知其誤三字作二字也脊中第十一椎節下間中樞氣府論王注曰在第十椎節下間俯而取之督脈氣所發營昇按此穴甲乙經千金方外臺秘要銅人經資生經諸書皆闕之筋縮第九椎節下間至陽第七椎節下間靈臺第六椎節下間營昇按甲乙經無此穴出氣府論王注神道第五椎節下間身柱第三椎節下間倭俗謂之知利介艾灸通說曰俗呼散氣姜希銅人腧穴針灸圖經曰在第二椎節下間又云背腧部在第三椎節下間陶道大椎節下間陷中自陽關至此諸穴並俯而取之自陽關至陶道諸穴俯而取之者脊骨隆凸椎穴以明也一說自長強至懸樞並伏地而取之自脊中至陶道並俯而取之大椎第一椎上陷中外臺秘要曰大椎平肩斜齊高大者是醫學原始曰在第一椎上平肩陷中營昇按八脈考釋音曰椎音槌脊之骨節也又背腧篇類注曰焦即椎之義指脊骨之節間也古謂之焦亦謂之顀後世作椎又刺熱篇王注曰脊節之謂椎脊窮之謂骶又類注曰此取脊椎之大法也項上三椎者乃項骨三節非脊椎也三椎之下陷者中方是第一椎節穴名大椎由此而下數之諸椎循次可得矣注證分寸歌曰自此項骨下脊骶分為二十四椎大椎上有項骨在約有三椎莫算之尾有長強亦不算中間二十一可排椎又項骨金鑑曰頸莖骨之上三節圓骨也釋骨曰三節植頸項者通曰柱骨其隱節肉中者曰復骨張氏復作伏氣府論馬注曰人之脊骨連項骨共有二十四節者應二十四氣亦有理凡灸大椎當以上項骨三節不算但項骨比大椎更高今人誤取高骨為大椎則項骨非灸大椎也又氣穴論馬注曰今人灸大椎者俱是項骨高起者見其骨高而大誤以為大椎而取之愚今除項骨三節則大椎又數為第一椎千金方曰取大椎之法除項骨三節不在內或人亦在項骨短而無可尋者但當以平肩之處為第一椎外臺曰大椎平肩斜齊高大者是針灸大全曰以平肩取之昧者習之不論椎骨之昂低偏與肩上平齊處為大椎可不謬乎然肩肉肥大者妄以平肩取之則穴道參差多不中也故除肉偏與肩尖平齊處以手按之使其回顧俯仰則附頭而轉者為項骨其不轉者為脊骨方是第一椎下以算之諸椎循次可得矣又張介賓曰凡取脊間督脈諸穴當於骨節突處取之但驗於魚骨為可知也若取於節下必不見效張氏之言如是然前哲皆取節下而無取骨節突處者夫周身之俞穴皆孔隙也故或在大骨之際或在小骨之下大筋之下小筋之上骨際陷中皆其處也滑氏取脊骨之低處節下者是猶欲詳之試解剖人骨節而視之益知予言之不謬若張氏之說孔隙之所不可在故斷然不可從矣瘂門氣府論王注曰在項髮際宛宛中去風府同身寸之一寸風府項入髮際一寸腦戶枕骨上強間後一寸五分強間後頂後一寸五分後頂百會後一寸五分百會神應經曰在頂中陷中容豆許去前髮際五寸後髮際七寸馬歌曰發上百會五寸央性理北溪陳氏曰猶天之極星居北類經曰此曰三才百會應天璇璣應人湧泉應地證治準繩引湯氏曰百會一穴前後髮際兩耳尖折中乃是穴也方書所載但云頂上旋毛中殊不審有雙頂者又有旋毛不正者庸醫之輩習循舊本誤人多矣營昇按旋毛有昂者有低者有在旁者在兩旁者其地不一定故由此求穴則不中必矣百會去前髮際五寸入後髮際七寸巔頂中央為是前頂囟會後一寸五分陷中囟會上星後一寸陷中千金方曰在神庭上二寸是上星八脈考曰囟會前一寸大成曰神庭後入髮際一寸陷中兼羅集曰有一取法以掌後橫紋當鼻尖中指盡處是神庭八脈考曰囟前二寸印堂刺瘧論曰取眉間鼻交頞中千金翼曰在兩眥中間營昇按此二穴諸書缺今補入之素髎鼻柱上端水溝鼻柱下人中大成曰鼻柱下溝中央近鼻孔陷中兌端入門曰上唇中央尖上齗交唇內齒上齗縫中齗音銀華佗內照圖曰任督二脈為一身陰陽之海又曰齗交穴在唇內齒上縫為任督二脈之會一身之要也督脈之長強在脊骶骨端腰俞在二十一椎節下間陽關在十六椎節下間命門在十四椎節下間懸樞在十三椎節下間脊中在十一椎節下間中樞在十椎節下間筋縮在九椎節下間至陽在七椎節下間靈臺在六椎節下間神道在五椎節下間身柱在三椎節下間陶道在大椎節下間大椎在第一椎上陷者中瘂門在項後入髮際五分風府在入髮際上一寸腦戶在入髮際上二寸強間在後頂後一寸五分後頂在百會後一尺五分百會在頂中央前頂在囟會後一寸五分囟會在上星後一寸上星在鼻直上入髮際一寸神庭在直鼻上入髮際五分素髎在鼻端準頭水溝在鼻下溝中央近鼻孔陷中兌端在上唇端齗交在唇內上齒縫中滑氏曰自屏翳而起歷長強穴並脊裡而上行循腰俞陽關命門懸樞脊中筋縮至陽靈臺神道身柱過風門循陶道大椎瘂門至風府入腦循腦戶強間後頂上巔至百會前頂囟會上星神庭循額至鼻柱經素髎水溝兌端至齗交而終焉任脈會陰甲乙經曰大便前小便後兩陰之間大成曰兩陰間任督沖三脈所起督由會陰而行背任由會陰而行腹沖由會陰而行足少陰曲骨神照集曰在臍下五寸中極下一寸橫骨之上毛際之中動脈應手是穴營昇按此橫骨非指腎經橫骨穴陰上橫骨也中極關元下一寸經穴指掌圖書曰自頭至足兩折中也關元臍下三寸一名丹田資生經集書經絡全書曰為生化之原圖翼曰在臍下三寸此穴當人身上下四旁之中故又名大中極乃男子藏精女子畜血之處小腸募也六十六難集註曰齊下腎間動氣者丹田也丹田者人之根元也精神之所藏五氣之根元太子之府也男子藏精女子主月水以生養子息合和陰陽之門戶也資生經曰關元乃丹田也諸經不言惟難經疏曰丹田在臍下三寸又曰臍下二寸名石門明堂載甲乙經一名丹田千金方素問注亦謂丹田在臍下二寸世醫因是遂以石門為丹田誤矣丹田乃臍下三寸難經疏論之詳石門臍下二寸一名丹田甲乙經千金方曰丹田在臍下二寸氣海臍下一寸五分大成曰臍下一寸半宛宛中男子生氣之海一名丹田本事方陰交臍下一寸神闕原始曰臍中央水分下脘下一寸上臍一寸營昇按千經方聚英醫統大成合參下脘下一寸臍上一寸為是下脘建里下一寸建里中脘下一寸中脘甲乙經曰上脘下一寸居心蔽骨與臍之中上脘醫統聚英巨闕下一寸臍上五寸神農皇帝針灸圖曰在臍上五寸金鑑曰從中脘上行在臍上五寸營昇曰甲乙經外臺聖惠方針方六集俱為巨闕下一寸五分非為一寸者是巨闕甲乙經曰鳩尾下一寸千金方曰灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上脘第三處去心下三寸名胃脘然或人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃脘又中屈半繩更分為二分從胃脘向上度一分即是上脘又上度取一分即是巨闕金鑑曰從上行在兩岐骨下二寸營昇按甲乙經千金方外臺銅人經聚英醫統六集資生聖惠方大成原始皆鳩尾下一寸氣府論王注巨闕上脘中脘建里下胺水分遞相去同身之一寸共為是鳩尾金鑑曰從巨闕上行一寸營昇按醫統聚英蔽骨之端在蔽骨下五分無蔽骨者從岐骨下行一寸曰鳩尾大成曰兩岐骨下一寸曰鳩尾者言其骨垂下如鳩尾形任脈之別甲乙經外臺聖惠方資生經皆在臆前蔽骨下五分甲乙經注曰蓋心上人無蔽骨者從上岐骨度下行一寸半人蔽骨有長者有短者又有無蔽骨者故不可拘蔽骨長短惟巨闕上行一寸為是中庭膻中下一寸六分膻中玉堂下一寸六分兩乳間華佗內照圖曰膻中名氣海在兩乳間為氣之海也氣所屬焉能分布陰陽氣者生源乃命之主類經曰人有四海胃者水穀之海衝脈者十二經之海膻中者氣之海腦者髓之海是也玉堂紫宮下一寸六分紫宮明下曰在華蓋下一寸陷者中仰而取之華蓋甲乙經資生經明下銅人經神照集原始共璇璣下一寸璇璣天突下一寸陷中天突馬歌曰璇上一寸天突起營昇按銅人經卷二醫學綱目入門發揮結喉下一寸甲乙經資生經結喉下二寸類經神照集結喉下三寸氣府論氣穴論及骨空論王注銅人經卷一聚英醫統結喉下四寸千金方外臺結喉下五寸八脈考結喉下四寸半明堂下經結喉下五分諸說分寸紛冗不知所從低頭度之則分寸甚短仰頭度之則分寸甚長故今定結喉下兩骨間璇璣上一寸為是廉泉原始曰在頷下結喉上中央舌本間承漿原始曰在頤前下唇下宛宛陷中開口取之齗基骨空論曰髓空一在齗基下任脈之會陰穴在前後陰正中曲骨在橫骨上中極下一寸毛際中極在臍下四寸關元在臍下三寸石門在臍下二寸氣海在臍下一寸半陰交在臍下一寸神闕在臍中水分在臍上一寸下脘在臍上二寸建里在臍上三寸中脘在臍上四寸上脘在臍上五寸巨闕在鳩尾下一寸鳩尾在臆前蔽骨下五分中庭在膻中下一寸六分膻中在玉堂下一寸六分玉堂在紫宮下一寸六分紫宮在華蓋下一寸六分華蓋在璇璣下一寸璇璣在天突下一寸天突在結喉下三寸廉泉在頷下結喉上中央舌本下承漿在頤前下唇稜下陷中齗基在唇內下齒縫中滑氏曰任脈起於中極之下會陰之分也由是循曲骨上毛際至中極行腹裡上循關元石門氣海陰交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣天突廉泉上頤循承漿環唇上至齗交分行系兩目下中央會承泣而終也奇經八脈滑氏曰脈有奇常十二經者常脈也奇經八脈則不拘於堂故謂之奇經二十七難曰脈有奇經八脈者不拘於十二經何也然有陽維有陰維有陽蹻有陰蹻有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈虞氏曰此八脈不繫正經陰陽無表裡配合別道奇行故曰奇經也陰維脈八脈考曰陰維起於諸陰之交其脈發於足少陰築賓穴為陰維之郄在內踝上五寸腨肉分中上循股內廉上行入小腹會足太陰厥陰少陰陽明於府舍上會足太陰於大橫腹哀循脅肋會足厥陰於期門上胸膈挾咽與任脈會於天突廉泉上至頂前而終凡一十四穴築賓足少陰腎經穴足內踝上五寸府舍足太陰脾經穴衝門上七分去中行四寸半大橫足太陰肺經穴臍旁四寸半腹哀足太陰肺經穴膽經日月下一寸五分期門足厥陰肝經穴任脈巨闕旁四寸半天突任脈穴璇璣上一寸廉泉任脈穴結喉上舌本陽維脈八脈考曰陽維起於諸陽之會其脈發於足太陽金門穴在足外踝下一寸五分上外踝七寸會足少陽於陽交為陽維之郄循膝外廉上髀厭抵少腹側會足少陽於居髎循脅肋斜上肘上會手陽明手足太陽於臂臑過肩前與手少陽會於臑會天髎卻會手足少陽足陽明於肩井入肩後會手太陽陽蹻於臑俞上循耳後會手足少陽於風池上腦空承靈正營目窗臨泣下額與手足少陽陽明五脈會於陽白循頭入耳上至本神而止凡三十二穴金門足太陽膀胱經穴陽交足少陽膽經穴外踝上七寸居髎足少陽膽經穴臂臑手陽明大腸經穴臑會手少陽三焦經穴天髎手少陽三焦經穴肩井足少陽膽經穴臑俞手太陽小腸經穴風池足少陽膽經穴天牖與天柱中間腦空足少陽膽經穴承靈後一寸五分承靈同正營後一寸五分正營同目窗後一寸目窗同臨泣後一寸臨泣同本神與曲差中間陽白同眉上一寸本神同神庭旁三寸十四經發揮凡二十四次無居髎臂臑承靈目窗四穴針灸節要曰凡二十四穴無居髎臂臑臑會目窗承靈五穴有風府瘂門二穴陰蹻脈八脈考曰陰蹻者足少陰之別脈其脈起於跟中足少陰然谷穴之後同足少陰循內踝下照海穴上內踝之上二寸以交信為郄直上循陰股入陰上循胸裡入缺盆上出人迎之前至咽嚨交貫衝脈入頄內廉上行屬目內眥與手足太陽足陽明陽蹻五脈會於晴明而上行凡八穴然谷足少陰腎經穴照海同交信同足內踝上二寸晴明足太陽膀胱經穴目內眥十四經發揮凡二穴無照海晴明二穴經脈篇凡四穴有然骨交信照海晴明四穴針灸聚英針灸節要無照海晴明二穴六集無然谷晴明二穴有照海交信二穴陽蹻脈八脈考曰陽蹻者足太陽之別脈其脈起於跟中出於外踝下足太陽申脈穴當踝後繞跟以僕參為本上外踝上三寸以附陽為郄直上循股外廉循脅後胛上會手太陽陽維於臑俞上行肩髆外廉會手陽明於巨骨會手陽明少陽於肩髃上人迎夾口吻會手足陽明任脈於地倉同足陽明上而行巨髎復會任脈於承泣至目內眥與手足太陽足陽明陰蹻五脈會於晴明穴從晴明上行入髮際下耳後入風池而終凡二十二穴申脈足太陽膀胱經穴外踝微前僕參同崑崙直下附陽同外踝上三寸臑俞手太陽小腸經穴肩髎後巨骨手陽明大腸經穴肩尖上行兩叉骨肩髃同肩端兩骨間地倉足陽明胃經穴口吻旁巨髎同鼻孔旁八分承泣同目下七分晴明足太陽膀胱經穴目內眥風池足少陽膽經穴三焦經天牖與膀胱經天柱中間十四經發揮凡二十穴有居髎穴無晴明風池二穴針方六集針灸聚英同衝脈二十八難楊注曰沖者通也言此脈下至於足上至於頭通受十二經之氣血故曰沖焉針方六集曰凡十二穴會陰衝脈之會醫經原旨曰衝脈起於胞中上循背裡為經絡之海則前亦督而後亦任也任脈循背謂之督脈自少腹直上者謂之任脈亦謂之督脈是以背腹分陰陽而言任督若三脈者名雖異而體則一耳故任沖督一源而三岐也又曰衝脈起於胞中陽明會於前陰故男女精血皆由前陰而降者以二經血氣總聚於此故稱為五藏六府十二經之海誠有非他經之可比也類注曰衝任為經絡之海其起脈之處則在胞中而上行於背裡所謂胞者子宮是也此男女藏精之所皆得稱為子宮惟女子於此受孕因名曰胞然衝任督脈皆起於此所謂一原而三岐也王啟玄曰腎脈與衝脈並下行循足合而盛大故曰大沖一云衝脈起於氣衝沖直而通故謂之沖八脈考曰沖為經脈之海又曰血海其脈與任脈皆起於少腹之內胞中浮而外者起於氣街並足陽明少陰二經之間循腹上行至橫骨俠臍左右各五分上行歷太赫氣穴四滿中注肓俞商曲石關陰都通谷幽門至胸中散凡二十四穴橫骨足少陰腎經穴太赫同氣穴同四滿同中注同肓俞同商曲同石關同陰都同通谷同幽門同任脈滑氏曰任之為言妊也行腹部中行為婦人生養之本上古天真論曰女子二七而天癸至任脈通太衝脈盛月事以時下七七任脈虛太衝脈衰天癸竭八脈考曰任為陰脈之海其脈起於中極之下少腹之內會陰之分上行而外出循曲骨上毛際至中極同足厥陰太陰少陰並行腹裡循關元歷石門氣海會足少陽衝脈於陰交循神闕水分會足太陰於下脘歷建里會手太陽少陽足陽明於中脘上上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣上喉嚨會陰維於天突廉泉上頤循承漿與手足陽明督脈會環唇上至下齗交復出分行循面系兩目下之中央至承泣而終凡二十七穴督脈十四經發揮曰督脈者起於下極之俞五色篇曰下極者心也四十四難曰下極為魄門甲乙經曰橫骨一名下極千金翼曰第十五椎名下極俞圖翼曰頞名下極皆雖同名所指異非今所謂下極滑氏曰督脈其脈起下極之俞由會陰曆長強又曰督脈由會陰而行於背任脈由會陰而行於腹衝脈由會陰出並少陰而散於胸中張景岳曰三脈本同一體督即任沖之綱領任沖即督之別名耳丁德用曰以下極為長強是督脈經穴以始於長強也八脈考曰督乃陽脈之海其脈起於腎下胞中至於少腹乃卻行於腰橫骨圍之中央系溺孔之端男子循莖下仍篡女子絡陰器合篡間骨空論類注曰篡交篡之義謂兩便爭行之所即前後二間之間也金鑑曰篡者橫骨下兩股之前相合共結之凹也前後兩陰之間名下極穴又屏翳穴會陰穴即男女陰氣之所也俱繞篡後屏翳穴別繞臀至少陰與太陽中絡者合少陰上股內廉由會陽貫脊會於長強穴在骶骨端與少陰會並脊裡上行歷腰俞陽關命門懸樞脊中中樞筋縮至陽靈臺沖道身柱陶道大椎與手足三陽會合上瘂門會陽維入舌本上至風府會足太陽陽維同入腦中循腦戶強間後頂上巔歷百會前頂囟會上星至神庭為足太陽督脈之會循額中至鼻柱經素髎水溝會手足陽明至兌端入齗交與任脈足陽明交會而終凡三十一穴督脈別絡自長強走任脈者由小腹直上貫臍中央上貫心入喉上頤環唇上系兩目之下中央會太陽於目內眥晴明穴上額與足厥陰同會於巔入絡於腦又別自腦下項循肩胛與手足太陽少陰會於大杼第一椎下兩旁去脊中一寸五分陷中內俠脊抵腰中入循膂絡腎帶脈張子和曰十二經與奇經七脈皆上下周流惟帶脈起少腹之側季脅之下環身一周絡腰而過如束帶之狀而衝任二脈循腹脅夾臍旁傳流於氣衝屬於帶脈絡於督脈衝任督三脈同起而異行一源而三岐皆絡帶脈八脈考曰帶脈者起於季脅足厥陰之章門穴同足少陽循帶脈穴圍身一周如束帶然又與足少陽會於五樞維道凡八穴章門足厥陰肝經穴季脅本帶脈足少陽膽經穴章門下一寸八分五樞同水道旁一寸五分維道同五樞下五分十四經發揮凡四穴帶脈維道針灸大成凡六穴帶脈五樞維道
