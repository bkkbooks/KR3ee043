front:
  text: 序蓋以人之軀殼內有五藏六府五藏六府之氣發於外層以為十二經而十二經有三百六十五穴此三百六十五穴乃五藏六府之氣所相輸應處也故謂之氣穴又謂之輸穴也是以人之有疾劑草蘇草荄之枝而治之於內施灸焫砭針於溪谷之會而治之於外內外相須而疾可瘳矣此醫之所以有體療針灸之二科也龜山醫負小阪元祐自弱冠從先考藍溪先生而學體療之術又從大膳大夫良益而受明堂孔穴之說蓋其意在乎欲兼二科也昔者祖考玉池先生受明堂之學於水藩良醫宮本春仙翁而傳之於中島元春元春傳之於藤井貞三貞三傳之於良益乃從春仙翁至元祐凡為六傳矣頃者元祐攜其所彙輯經穴纂要五卷來余齊頭曰某師事藍溪先生者若千年矣幸賴先生之靈得筮仕於敝藩安居自贍惟懼不免尸素之罪因竊願以嘗所學著諸簡編報君恩之萬一然賦性拙劣而嗇於才雖寒膚嗛腹屹屹惟勤猶未有所闡發也顧內科之為書往哲近賢之所撰述未知幾十百部各病甄別診候處療之法似無餘蘊矣唯明堂一類皇甫氏而降至於挽近簿録所著僅僅不過數十部況此間所傳亦無多矣而經脈流注孔穴分寸諸說不一學者不能無惑焉於是僭不自量原之於靈素甲乙參之乎銅人資生諸書師傳所承愚慮所得薈萃為編前繪圖而後衆說以便披覽雖未能闖明堂之閫奧或有所裨益於蒙士耶及門數輩將刻以布於世請藉先生之言取信乎世也余翻而瀏覽之而嘆曰嗚呼明堂之晦也久矣方今醫家日趨簡便如五藏六府經絡等之說庋而不講或有從事於此者目以為迂腐鑿空之談亦可勝嘆哉今元祐憤發而有斯舉十二經穴則依於甄權所定藏府形象則仿於楊介存真其稽考固博而其用志誠勤矣聞今從元祐而承其學者不少矣若此書行則不特傳傳相因世顓針灸者能讀是編而明明堂之義莫有孔穴乖處之弊若針若灸沉疴痼疾草蘇草荄之枝所不及有奏效於猝霍之間也則濟弱扶危其嘉惠後學者不廣且大乎哉則如玉池藍溪二先生亦必首肯於無何有之鄉乎為之序文化庚午歲中秋前一日丹波元簡廉夫撰自序古昔論經絡者雖極衆多其要皆本於素靈矣而素靈之為書幽遠簡古多不可得而通曉者則其本之之論亦多不可得而通曉者則固矣故世人多以滑伯仁十四經發揮為便而發揮亦藍本於金蘭循經此書吾之所未見也雖不能無疑然滑氏之所注略與甲乙經銅人經相符則決不為無據者矣豫不肖勤苦於此道有年於茲亦以滑氏為基本旁探群書考異同取捨折衷以便於推經絡取腧穴亦復自親解剖所視內景與古人所說異者今新圖之以示四方併為五卷名曰經穴纂要冀四方之君子有正豫過則何幸過之文化庚午秋七月小阪營升元祐識
