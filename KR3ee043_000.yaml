body:
  text: 凡例十四經發揮俞穴之數凡三百五十四穴也氣府論曰氣穴三百六十五以應一歲氣穴論曰凡三百六十五穴針之所由行也又曰孫絡三百六十五穴亦應一歲又曰溪谷三百六十五穴會亦應一歲又曰三百六十五脈九針十二原篇曰節之交三百六十五會針解論曰人九竅三百六十五絡又曰除三百六十五節之邪氣調經論曰三百六十五節乃生百病邪氣藏府病形篇曰十二經脈三百六十五絡千金方曰通十二經脈辨三百六十五孔穴邪客篇曰歲三百六十五日人有三百六十五節脈經曰天有三百六十五日人有三百六十五節聖濟總録曰有骨三百六十五會醫彀曰孫絡生三百六十五骨節骨節生三百六十五大穴由是觀之皆三百六十五之數也發揮既脫十一穴故今參考諸書而補所脫漏之穴以合於三百六十五之數也引用書明堂灸經則曰明堂針灸甲乙經則曰甲乙千金方則曰千金千金翼則曰翼外臺祕要則曰外臺銅人腧穴針灸圖經則曰銅人經古今醫疑則曰醫統針灸資生經則曰資生神應經則曰神應針灸聚英則曰聚英針灸大全則曰徐氏又曰大全類經則曰類又曰張氏又曰圖翼醫學綱目則曰綱目又曰醫綱醫學入門則曰入門注證發微則曰注證又曰馬氏又曰分寸歌針灸六集則曰六集又曰神照集針灸大成則曰大成醫宗金鑑則曰金鑑醫學原始則曰原始十四經合參則曰合參其他皆全出書名俞穴中三角者禁針四角者禁灸銅人形圖系彩各以其藏府之色由於素問經絡論也藏經濃府經薄今所彩肺經銀大腸經胡粉心經朱小腸經薄赤心包經紫三焦經薄紫腎經黑膀胱經薄黑脾經黃胃經薄黃肝經青膽經緑青督脈金任脈銀各視其系彩而可知藏府之經行矣經穴纂要骨度醫統曰人有大小長短不等惟周身尺寸可以取之人長則寸長人短則寸短嬰孺老幼皆然又曰今世之醫惟取中指中節謂之同身寸凡取諸穴悉依之其亦未之思耳殊不知同身之義隨身之大小肥瘦長短隨處分折而取之則自無此長短之弊而庶幾乎同身之義有準矣若以中指為法如瘦人指長而身小則背腹之橫寸豈不太闊耶如肥人指短而身大則背腹之橫寸豈不太狹耶古人所以特謂同身寸法者蓋必同其身體隨在而折之固無肥瘦長短之瘥訛也頭之大骨圍二尺六寸銅人經六作八非胸圍四尺五寸兩乳間腰圍四尺二寸平臍周圍曰腰發所覆者顱至項一尺二寸甲乙經尺字上有一字類經曰發所覆者謂髮際也前髮際為額顱後髮際以下為項前自顱後至項長一尺二寸明堂灸經曰定髮際法曰如是患人先因疾患後脫落盡髮際或性本額項無發難憑取穴今定患人兩眉中心直上三寸為髮際後取大椎直上三寸為髮際以此為準醫統曰前髮際至後髮際折作十二節為一尺二寸前髮際不明者取眉心直上三寸後髮際不明者取大椎上行三寸前後共不明者折作一尺八寸頭部直寸並依此法發以下至頤長一尺男子終折甲乙經男作君終作參注又作三折馬氏曰君子終折言士君子之面部三停齊等可以始中終而三折之也衆人未必然耳結喉以下至缺盆中長四寸營升按因頭之俯仰也仰則其寸長俯則其寸短且自結喉尖頭量之則其寸長自結喉之下端量之則其寸短也今詳之結喉下大骨兩突骨之中間是穴缺盆以下至𩩲𩨗長九寸過則肺大不滿則肺小本藏篇曰無𩩲𩨗者心高𩩲𩨗舉者心下𩩲𩨗長者心下堅𩩲𩨗弱小以薄者心脆𩩲𩨗直下不舉者心端正𩩲𩨗倚一方者心偏傾也類經曰𩩲𩨗一名尾翳亦鳩骨蔽骨也𩩲𩨗以下至天樞長八寸過則胃大不及則胃小銅人經曰𩩲𩨗下至臍長八寸神應經曰人若無心蔽骨者取岐骨下至臍心共折九寸取之針方六集曰上取岐骨下至臍心共折作九寸取之天樞以下至橫骨長六寸半過則回腸廣長不滿則狹短橫骨長六寸半甲乙經陰交臍下一寸氣海臍下一寸五分石門臍下二寸關元臍下三寸中極臍下四寸曲骨橫骨上中極下毛際陷者中凡五寸類經醫統神應經針方六集金鑑等臍心下至毛際橫骨穴折作五寸為是橫骨上廉以下至內輔之上廉長一尺八尺圖翼曰骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸踝以下至地長三寸膝膕以下至跗屬長一尺六寸類經曰膝後曲處曰膕凡兩踝前後脛掌所交之處皆為跗之屬也張志聰曰屬者概足面而言也跗屬以下至地長三寸角以下至柱骨長一尺銅人經曰腦角下至柱骨長一尺類經曰角頭側大骨耳上高角也柱骨肩骨之頸項之根也行腋中不見者長四寸注證曰自柱骨行於腋下之隱處長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸注證曰目下高骨為顴兩乳之間廣九寸半營升按甲乙經曰自氣戶俠輸府兩旁各二寸下行至乳根凡十二穴廣八寸滑氏發揮曰自膻中橫至神封二寸神封至乳中二寸左右合而得八寸也圖翼醫統針方六集金鑑等俱當折八寸為當矣兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸營升按古人此骨度之說尤多菊池玄藏安井元越等自腋下橫文至曲池為一尺宮本春仙中島元春等自腋下至肘通計為一尺一寸淺井賴母借自肘至腕一尺二寸半之法用之皆不可為準則村上宗占骨度正誤曰夫以骨度篇所謂人長七尺五寸者橫直等謂也如張氏之說自肩端量則中乎脊骨而相舍兩肩之間惡合骨度乎可調張氏千慮之失也介賓既如此況後學乎肩至肘一尺七寸度之者舉臂伸手於左右而自大椎下脊中至肘尖可為一尺七寸也今人肩端肩髃至曲池為一尺七寸誤也豫謂宗占所謂人長七尺五寸雖言橫直等謂是亦不合也又宗占所謂人長七尺五寸謂橫直等自大椎至肘一尺七寸肘至腕一尺二寸半自腕至中指本節長四寸自本節至末四寸半通計七尺六寸也是亦不合於七尺五寸故宗占私以為自本節至末四寸半半字為衍文遂削去之為七尺五寸是亦無據但宗占一家之說已矣惜哉宗占未嘗見針灸腧穴銅人圖經歟針灸腧穴銅人圖經正面長七尺五寸伏人長七尺五寸側人長七尺五寸橫直闊狹相去遠近骨格三折各長七尺五寸據之橫直等謂也然與骨度篇參考則亦有異同而合於通計七尺五寸之法乃知宗占自大椎至肘為一尺七寸橫直等謂者甚誤也又針灸腧穴銅人圖經兩肩相去二尺一寸肩下至肘一尺七寸因肩下二字觀之自大椎至肘非一尺七寸明矣故張氏之言肩者即肩端也自肩髃至曲池為一尺七寸可從張氏之說肘至腕長一尺二寸半腕至中指本節長四寸本節至末長四寸半類經曰末指端也項發以下至背骨長二寸半圖翼曰自後髮際以至大椎項骨三節處也膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七圖翼曰背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐總共二尺九寸九分六釐不足四釐者有零未盡也六書精蘊曰𫈨力莒切脊骨也凡二十一部如珠氣行一起一伏也象上下相貫形凡藏府皆繫於𫈨心系於五椎自十七椎至二十為腰監骨所弇心之前有蔽骨天然之妙也或從肉作膂脊之重在骨不在肉也
